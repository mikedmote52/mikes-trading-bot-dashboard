<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#1a1714">
  <title>Squeeze Prophet</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='75' font-size='75'>⚡</text></svg>">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Source+Serif+4:opsz,wght@8..60,400;8..60,500;8..60,600;8..60,700&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">

  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    :root {
      --bg: #1a1714;
      --bg-elev: #221d18;
      --bg-elev-2: #2a241e;
      --line: #322b23;
      --line-soft: #2a241e;

      --ink: #f4ede2;
      --ink-soft: #c8bcab;
      --ink-mute: #a89c8a;
      --ink-dim: #7a7064;
      --ink-faint: #5a5147;

      --coral: #ff6f5e;
      --coral-soft: rgba(255,111,94,0.14);
      --coral-line: rgba(255,111,94,0.4);

      --gain: #6ec77d;
      --gain-soft: rgba(110,199,125,0.12);
      --gain-line: rgba(110,199,125,0.35);

      --loss: #e85d5d;
      --loss-soft: rgba(232,93,93,0.12);
      --loss-line: rgba(232,93,93,0.35);

      --warn: #d4a64a;
      --warn-soft: rgba(212,166,74,0.14);
      --warn-line: rgba(212,166,74,0.4);

      --tier-s: #b388ff;
      --tier-s-soft: rgba(179,136,255,0.16);
      --tier-s-line: rgba(179,136,255,0.45);

      --serif: 'Source Serif 4', Georgia, 'Times New Roman', serif;
      --sans: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
      --mono: 'JetBrains Mono', ui-monospace, SFMono-Regular, Menlo, monospace;
    }
    *, *::before, *::after { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; height: 100%; overflow: hidden; }
    body {
      background: var(--bg);
      color: var(--ink);
      font-family: var(--sans);
      font-size: 14px;
      line-height: 1.55;
      -webkit-font-smoothing: antialiased;
      text-rendering: optimizeLegibility;
    }
    #root { height: 100%; }
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-thumb { background: #3a3128; border-radius: 2px; }
    button { font-family: inherit; }
    table { border-collapse: collapse; width: 100%; }
    th, td { text-align: left; }
    .display { font-family: var(--serif); font-weight: 600; line-height: 1.05; letter-spacing: -0.015em; }
    .headline { font-family: var(--serif); font-weight: 600; line-height: 1.15; letter-spacing: -0.01em; }
    .mono { font-family: var(--mono); font-variant-numeric: tabular-nums; }
    .label-soft { font-size: 13px; font-weight: 500; color: var(--ink-mute); letter-spacing: 0; text-transform: none; }
    .caption { font-size: 12px; color: var(--ink-dim); }
  </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useId, useRef, useMemo } = React;

// ── Constants ───────────────────────────────────────────────────
// Default starting equity ($100K paper). All references below should call
// startingEquity(health) so the figure tracks health.json.starting_equity
// when present (post-2026-05-12 health_snapshot.py emits this field). The
// raw constant remains as a defensive fallback for components that haven't
// been threaded yet.
const STARTING_EQUITY_DEFAULT = 100000;
const STARTING_EQUITY = 100000;  // fallback only — prefer startingEquity(health)
const startingEquity = (health) =>
  (health && health.stats && Number(health.stats.starting_equity))
  || STARTING_EQUITY_DEFAULT;
const HEALTH_POLL_MS  = 30 * 1000;
const V2_POLL_MS      = 5 * 60 * 1000;
const CLOSED_POLL_MS  = 5 * 60 * 1000;
const MTD_TARGET_PCT  = 5.0;

const C = {
  bg: 'var(--bg)',
  bgElev: 'var(--bg-elev)',
  bgElev2: 'var(--bg-elev-2)',
  line: 'var(--line)',
  lineSoft: 'var(--line-soft)',
  ink: 'var(--ink)',
  inkSoft: 'var(--ink-soft)',
  inkMute: 'var(--ink-mute)',
  inkDim: 'var(--ink-dim)',
  inkFaint: 'var(--ink-faint)',
  coral: 'var(--coral)',
  coralSoft: 'var(--coral-soft)',
  coralLine: 'var(--coral-line)',
  gain: 'var(--gain)',
  gainSoft: 'var(--gain-soft)',
  gainLine: 'var(--gain-line)',
  loss: 'var(--loss)',
  lossSoft: 'var(--loss-soft)',
  lossLine: 'var(--loss-line)',
  warn: 'var(--warn)',
  warnSoft: 'var(--warn-soft)',
  warnLine: 'var(--warn-line)',
};

const TIER_COLORS = {
  S: { bg: 'rgba(179,136,255,0.16)', text: '#b388ff', border: 'rgba(179,136,255,0.45)' },
  A: { bg: 'rgba(110,199,125,0.16)', text: '#6ec77d', border: 'rgba(110,199,125,0.45)' },
  B: { bg: 'rgba(212,166,74,0.16)',  text: '#d4a64a', border: 'rgba(212,166,74,0.45)' },
  C: { bg: 'rgba(168,156,138,0.10)', text: '#a89c8a', border: 'rgba(168,156,138,0.30)' },
};

// ── Utilities ───────────────────────────────────────────────────
const fmt$ = n => {
  const v = Math.abs(Number(n));
  return (Number(n) < 0 ? '-' : '') + '$' + v.toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
};
const fmt$k = n => {
  const v = Math.abs(Number(n));
  if (v >= 10000) return (Number(n) < 0 ? '-' : '') + '$' + (v / 1000).toFixed(1) + 'k';
  return fmt$(n);
};
const fmtPct = (n, dec = 1) => (Number(n) >= 0 ? '+' : '') + Number(n).toFixed(dec) + '%';
const pnlColor = v => Number(v) >= 0 ? C.gain : C.loss;
const fmtFloat = n => {
  if (!n) return '—';
  const m = n / 1e6;
  return m < 1 ? (n / 1e3).toFixed(0) + 'K' : m < 10 ? m.toFixed(1) + 'M' : Math.round(m) + 'M';
};

function fmtAge(ts) {
  if (!ts) return '—';
  const ms = Date.now() - new Date(ts).getTime();
  const m = Math.floor(ms / 60000);
  if (m < 60) return m + 'm ago';
  const h = Math.floor(m / 60);
  if (h < 24) return h + 'h ago';
  return Math.floor(h / 24) + 'd ago';
}
function today() { return new Date().toISOString().slice(0, 10); }
function currentMonthStr() {
  const d = new Date();
  return `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}`;
}
function daysInMonth(year, month) { return new Date(year, month, 0).getDate(); }

// ── Data Fetching ───────────────────────────────────────────────
function usePoll(url, ms) {
  const [data, setData] = useState(null);
  useEffect(() => {
    let dead = false;
    const load = () =>
      fetch(url + '?t=' + Date.now(), { cache: 'no-store' })
        .then(r => r.ok ? r.json() : null)
        .then(d => { if (!dead && d) setData(d); })
        .catch(() => {});
    load();
    const id = setInterval(load, ms);
    return () => { dead = true; clearInterval(id); };
  }, [url, ms]);
  return data;
}
function useOnce(url) {
  const [data, setData] = useState(null);
  useEffect(() => {
    fetch(url + '?t=' + Date.now(), { cache: 'no-store' })
      .then(r => r.ok ? r.json() : null)
      .then(d => { if (d) setData(d); })
      .catch(() => {});
  }, [url]);
  return data;
}

// ── Base UI ─────────────────────────────────────────────────────
function Card({ children, style, accent, padding = 18 }) {
  return (
    <div style={{
      background: C.bgElev,
      border: `1px solid ${C.line}`,
      borderRadius: 14,
      padding,
      borderLeft: accent ? `2px solid ${accent}` : `1px solid ${C.line}`,
      ...style,
    }}>{children}</div>
  );
}

function SectionTitle({ children, hint }) {
  return (
    <div style={{ display: 'flex', alignItems: 'baseline', justifyContent: 'space-between', marginBottom: 14 }}>
      <h3 className="headline" style={{ fontSize: 20, color: C.ink, margin: 0 }}>{children}</h3>
      {hint && <span style={{ fontSize: 12, color: C.inkDim }}>{hint}</span>}
    </div>
  );
}

function Pill({ children, color = C.inkMute, bg, border }) {
  return (
    <span style={{
      display: 'inline-flex', alignItems: 'center', gap: 4,
      background: bg || 'transparent', color, border: `1px solid ${border || 'transparent'}`,
      borderRadius: 999, padding: '2px 9px', fontSize: 11, fontWeight: 600,
      letterSpacing: 0.1, lineHeight: 1.5,
    }}>{children}</span>
  );
}

function TierBadge({ tier, sm }) {
  const c = TIER_COLORS[tier] || TIER_COLORS.C;
  return (
    <span style={{
      background: c.bg, color: c.text, border: `1px solid ${c.border}`,
      borderRadius: 6, padding: sm ? '2px 7px' : '3px 9px',
      fontSize: sm ? 10 : 12, fontWeight: 700, letterSpacing: 0.4,
      display: 'inline-block', lineHeight: 1.4, fontFamily: 'var(--sans)',
    }}>{tier}</span>
  );
}

function EmptyState({ msg, sub }) {
  return (
    <div style={{ padding: '20px 4px', color: C.inkDim, fontSize: 13, lineHeight: 1.6 }}>
      <div style={{ color: C.inkMute }}>{msg || 'No data yet.'}</div>
      {sub && <div style={{ fontSize: 11, color: C.inkFaint, marginTop: 4 }}>{sub}</div>}
    </div>
  );
}

// ── Sparkline ─────────────────────────────────────────────────────
function Sparkline({ values, width = 60, height = 16, color, fill = true, strokeWidth = 1.5 }) {
  const uid = useId().replace(/[^a-z0-9]/gi, '');
  if (!values || values.length < 2) {
    return <svg width={width} height={height}><line x1="0" x2={width} y1={height/2} y2={height/2} stroke={C.inkFaint} strokeWidth="1" strokeDasharray="2,2" /></svg>;
  }
  const minV = Math.min(...values);
  const maxV = Math.max(...values);
  const range = (maxV - minV) || 1;
  const toX = i => (i / (values.length - 1)) * width;
  const toY = v => height - 1 - ((v - minV) / range) * (height - 2);
  const pts = values.map((v, i) => `${toX(i).toFixed(1)},${toY(v).toFixed(1)}`).join(' ');
  const last = values[values.length - 1];
  const first = values[0];
  const lineColor = color || (last >= first ? C.gain : C.loss);
  const areaPts = pts + ` ${width},${height} 0,${height}`;
  return (
    <svg width={width} height={height} viewBox={`0 0 ${width} ${height}`} preserveAspectRatio="none" style={{ display: 'block', overflow: 'visible' }}>
      <defs>
        <linearGradient id={`sp${uid}`} x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stopColor={lineColor} stopOpacity="0.25"/>
          <stop offset="100%" stopColor={lineColor} stopOpacity="0"/>
        </linearGradient>
      </defs>
      {fill && <polygon points={areaPts} fill={`url(#sp${uid})`} />}
      <polyline points={pts} fill="none" stroke={lineColor} strokeWidth={strokeWidth} strokeLinecap="round" strokeLinejoin="round" />
    </svg>
  );
}

// ── Big Line Chart ────────────────────────────────────────────────
function LineChart({ data, targetData, height = 100, valueKey = 'equity', color }) {
  const uid = useId().replace(/[^a-z0-9]/gi, '');
  if (!data || data.length < 2) return <EmptyState msg="Equity curve fills as snapshots accumulate." />;
  const values = data.map(d => typeof d === 'object' ? (d[valueKey] || 0) : d);
  const targets = targetData ? targetData.map(d => typeof d === 'object' ? d[valueKey] : d) : [];
  const allVals = [...values, ...targets].filter(Boolean);
  const minV = Math.min(...allVals) * 0.998;
  const maxV = Math.max(...allVals) * 1.002;
  const range = maxV - minV || 1;
  const W = 400, H = height;
  const toX = i => (i / (values.length - 1)) * W;
  const toY = v => H - 4 - ((v - minV) / range) * (H - 10);
  const pts = values.map((v, i) => `${toX(i).toFixed(1)},${toY(v).toFixed(1)}`).join(' ');
  const areaPts = pts + ` ${W},${H} 0,${H}`;
  const last = values[values.length - 1];
  const first = values[0];
  const lineColor = color || (last >= first ? C.gain : C.loss);
  let tgtPts = '';
  if (targets.length >= 2) {
    tgtPts = targets.map((v, i) => `${(i / (targets.length - 1) * W).toFixed(1)},${toY(v).toFixed(1)}`).join(' ');
  }
  return (
    <svg width="100%" height={height} viewBox={`0 0 ${W} ${H}`} preserveAspectRatio="none" style={{ display: 'block' }}>
      <defs>
        <linearGradient id={`g${uid}`} x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stopColor={lineColor} stopOpacity="0.32"/>
          <stop offset="100%" stopColor={lineColor} stopOpacity="0.02"/>
        </linearGradient>
      </defs>
      <polygon points={areaPts} fill={`url(#g${uid})`} />
      {tgtPts && (
        <polyline points={tgtPts} fill="none" stroke={C.warn} strokeWidth="1.5" strokeDasharray="6,4" opacity="0.55" />
      )}
      <polyline points={pts} fill="none" stroke={lineColor} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" />
    </svg>
  );
}

// ══════════════════════════════════════════════════════════════════
// REGIME WEATHER STRIP — plain language sentence
// ══════════════════════════════════════════════════════════════════
function regimeNarrative(regime) {
  if (!regime) return { headline: 'Regime loading.', sub: '', tone: 'neutral' };
  const tone = regime.regime === 'green' ? 'green' : regime.regime === 'red' ? 'red' : 'neutral';
  if (regime.stub) {
    const reason = (regime.stub_reason || '').replace(/^No module named.*/, 'live feed offline');
    return {
      headline: 'Regime feed offline. Operating on stub values.',
      sub: reason || '',
      tone: 'neutral',
    };
  }
  const iwm = regime.iwm_return_20d;
  const vol = regime.spy_realized_vol_20d;
  const breadth = regime.breadth_differential;
  const parts = [];
  if (vol != null) parts.push(`vol ${vol.toFixed(1)}%`);
  if (iwm != null) parts.push(`IWM 20d ${fmtPct(iwm)}`);
  if (breadth != null) parts.push(`breadth ${breadth >= 0 ? 'wide' : 'narrow'}`);
  const stat = parts.join(', ');
  let read = '';
  if (regime.regime === 'green') read = 'Squeeze setups outperform here historically.';
  else if (regime.regime === 'red') read = 'Squeeze setups underperform here historically.';
  else read = 'Mixed signal.';
  return {
    headline: `${stat ? stat + '. ' : ''}${read}`,
    sub: regime.regime_label ? regime.regime_label : '',
    tone,
  };
}

function RegimeWeatherStrip({ regime }) {
  const n = regimeNarrative(regime);
  const accent = n.tone === 'green' ? C.gain : n.tone === 'red' ? C.loss : C.warn;
  const glow = n.tone === 'green' ? 'rgba(110,199,125,0.06)'
             : n.tone === 'red' ? 'rgba(232,93,93,0.06)'
             : 'rgba(212,166,74,0.04)';
  return (
    <div style={{
      background: `linear-gradient(180deg, ${glow} 0%, transparent 100%)`,
      borderTop: `1px solid ${accent === C.gain ? 'rgba(110,199,125,0.25)' : accent === C.loss ? 'rgba(232,93,93,0.25)' : 'rgba(212,166,74,0.2)'}`,
      borderBottom: `1px solid ${C.line}`,
      padding: '16px 18px 18px',
      marginBottom: 14,
    }}>
      <div style={{ display: 'flex', alignItems: 'center', gap: 8, marginBottom: 6 }}>
        <span style={{ width: 8, height: 8, borderRadius: '50%', background: accent, boxShadow: `0 0 8px ${accent}` }} />
        <span style={{ fontSize: 12, fontWeight: 600, color: accent, letterSpacing: 0.3 }}>
          REGIME · {(regime?.regime || 'unknown').toUpperCase()}
        </span>
      </div>
      <div className="headline" style={{ fontSize: 17, color: C.ink, lineHeight: 1.4 }}>
        {n.headline}
      </div>
      {n.sub && <div style={{ fontSize: 12, color: C.inkDim, marginTop: 4 }}>{n.sub}</div>}
    </div>
  );
}

// ══════════════════════════════════════════════════════════════════
// HERO COMBINED P&L
// ══════════════════════════════════════════════════════════════════
function HeroPnL({ equity, equityHistory, optionsTotals, startingEquity: startEq }) {
  // startingEquity now flows in as a prop so the hero number stays correct
  // if Mike funds real capital and the publisher emits a different baseline.
  const baseEquity = Number(startEq) || STARTING_EQUITY_DEFAULT;
  const optsPnl = (optionsTotals?.total_open_unrealized_pl || 0) + (optionsTotals?.realized_this_month || 0);
  const eqPnl = (equity || baseEquity) - baseEquity;
  const totalPnl = eqPnl + optsPnl;
  const totalPct = (totalPnl / baseEquity) * 100;

  // Build last 20 trading day values for the sparkline window
  const series = useMemo(() => {
    const h = equityHistory || [];
    return h.slice(-20).map(e => e.equity || 0);
  }, [equityHistory]);

  // Honest day count: days elapsed since the first equity snapshot, not the
  // 20-day slice-window length. Previously the footer rendered "{series.length}
  // days" which read as "since inception" but was actually capped at 20.
  const daysSinceInception = useMemo(() => {
    const h = equityHistory || [];
    if (h.length === 0) return 0;
    const first = h[0]?.date;
    if (!first) return h.length;
    const start = new Date(first);
    const today = new Date();
    const days = Math.max(1, Math.round((today - start) / 86400000));
    return days;
  }, [equityHistory]);

  const accent = totalPnl >= 0 ? C.gain : C.loss;

  return (
    <div style={{ padding: '4px 18px 16px' }}>
      <div style={{ display: 'flex', alignItems: 'baseline', gap: 8, marginBottom: 4 }}>
        <span style={{ fontSize: 12, color: C.inkMute, fontWeight: 500 }}>Combined P&L</span>
        <span style={{ fontSize: 11, color: C.inkDim }}>· equity + options</span>
      </div>
      <div style={{ display: 'flex', alignItems: 'flex-end', justifyContent: 'space-between', gap: 12 }}>
        <div className="display" style={{ fontSize: 44, color: accent }}>
          {totalPnl >= 0 ? '+' : '−'}${Math.abs(totalPnl).toLocaleString('en-US', { maximumFractionDigits: 0 })}
        </div>
        <div style={{ textAlign: 'right' }}>
          <div className="mono" style={{ fontSize: 14, color: accent, fontWeight: 600 }}>{fmtPct(totalPct, 2)}</div>
          <div className="caption">since inception</div>
        </div>
      </div>
      <div style={{ marginTop: 12, height: 56 }}>
        {series.length >= 2 ? (
          <Sparkline values={series} width={400} height={56} color={accent} strokeWidth={2} />
        ) : (
          <div style={{ fontSize: 12, color: C.inkDim }}>Equity curve fills after a few sessions of snapshots.</div>
        )}
      </div>
      <div style={{ display: 'flex', gap: 16, marginTop: 8, fontSize: 11, color: C.inkDim }}>
        <span>Equity: <span className="mono" style={{ color: pnlColor(eqPnl) }}>{eqPnl >= 0 ? '+' : ''}{fmt$(eqPnl)}</span></span>
        <span>Options: <span className="mono" style={{ color: pnlColor(optsPnl) }}>{optsPnl >= 0 ? '+' : ''}{fmt$(optsPnl)}</span></span>
        <span style={{ marginLeft: 'auto' }}>{daysSinceInception} day{daysSinceInception === 1 ? '' : 's'}</span>
      </div>
    </div>
  );
}

// ══════════════════════════════════════════════════════════════════
// ATTENTION QUEUE
// ══════════════════════════════════════════════════════════════════
function buildAttentionItems(positions, v2Data, optionsData, missed) {
  const items = [];
  // Missed-opportunity surfacing (added 2026-05-26). If today's tracker shows
  // winners the bot didn't catch, that's the "anything weird I should look
  // at?" line. Worth one slot at priority 2.
  if (missed && missed.n_winners > 0 && (missed.n_caught_and_traded || 0) === 0) {
    items.push({
      priority: 2,
      symbol: 'SCAN',
      title: `${missed.n_winners} winners moved today, none caught`,
      body: missed.n_on_watchlist_not_taken > 0
        ? `${missed.n_on_watchlist_not_taken} were on watchlist but not taken. Worth reviewing entry gates.`
        : `All ${missed.n_missed_entirely || missed.n_winners} were missed entirely. Scanner cast a narrow net today.`,
      accent: C.warn,
    });
  }
  for (const p of positions || []) {
    const plPct = parseFloat(p.unrealized_plpc) * 100;
    const tier = (p.entry_signals && p.entry_signals.tier) || null;
    // Stop-watch: bleeding past -10%
    if (plPct <= -10) {
      items.push({
        priority: 1,
        symbol: p.symbol,
        title: `${p.symbol} bleeding ${plPct.toFixed(1)}%`,
        body: `Position is approaching stop territory. Tier ${tier || '—'}, ${fmt$(parseFloat(p.unrealized_pl))} unrealized.`,
        accent: C.loss,
      });
    }
    // Quietly winning past +15% — could lock partial
    if (plPct >= 15) {
      items.push({
        priority: 2,
        symbol: p.symbol,
        title: `${p.symbol} up ${plPct.toFixed(1)}%, consider trim`,
        body: `Position has run; tier ${tier || '—'}. Bot will hold to target unless stop moves.`,
        accent: C.gain,
      });
    }
  }
  // Options alerts — previously these only surfaced on the Options tab,
  // so a fired max-hold alert or expiring contract could sit unseen on the
  // home screen while the Attention Queue claimed "All quiet."
  for (const a of (optionsData?.alerts || [])) {
    const d = a.max_hold_days_left;
    if (typeof d === 'number') {
      if (d < 0) {
        items.push({
          priority: 1,
          symbol: a.ticker || 'OPT',
          title: `${a.ticker || 'Options'} past max hold by ${Math.abs(d)} day${Math.abs(d) === 1 ? '' : 's'}`,
          body: `Exit triggered for ${a.occ_symbol || 'contract'}. Bot should be closing; verify on Options tab.`,
          accent: C.loss,
        });
      } else if (d <= 2) {
        items.push({
          priority: 2,
          symbol: a.ticker || 'OPT',
          title: `${a.ticker || 'Options'} max hold in ${d} day${d === 1 ? '' : 's'}`,
          body: `Approaching exit window for ${a.occ_symbol || 'contract'}.`,
          accent: C.warn,
        });
      }
    } else if (a.kind || a.message) {
      // Generic alert shape — surface as-is so we never silently swallow one.
      items.push({
        priority: 2,
        symbol: a.ticker || 'OPT',
        title: `${a.ticker || 'Options'} alert: ${a.kind || 'check'}`,
        body: a.message || `Open Options tab for details on ${a.occ_symbol || 'this contract'}.`,
        accent: C.warn,
      });
    }
  }
  // Scanner picks the bot wanted but couldn't size
  const picks = (v2Data?.top_picks || []).slice(0, 3);
  const heldSymbols = new Set((positions || []).map(p => p.symbol));
  for (const pk of picks) {
    if (!heldSymbols.has(pk.symbol) && pk.score >= 50) {
      items.push({
        priority: 3,
        symbol: pk.symbol,
        title: `${pk.symbol} scanned at ${pk.score}, not in book`,
        body: `Tier ${pk.conviction || '—'}. ${(pk.thesis || '').split('|')[0].trim()}`,
        accent: C.coral,
      });
      break;
    }
  }
  items.sort((a, b) => a.priority - b.priority);
  return items.slice(0, 4);
}

function AttentionQueue({ positions, v2Data, optionsData, missed }) {
  const items = buildAttentionItems(positions, v2Data, optionsData, missed);
  return (
    <Card style={{ marginBottom: 14 }} padding={16}>
      <SectionTitle>Attention</SectionTitle>
      {items.length === 0 ? (
        <div style={{ fontSize: 13, color: C.inkMute, padding: '4px 0' }}>
          All quiet. Nothing in stop range, no oversized winners, no missed picks.
        </div>
      ) : (
        <div style={{ display: 'flex', flexDirection: 'column', gap: 12 }}>
          {items.map((it, i) => (
            <div key={i} style={{
              display: 'flex', gap: 12, alignItems: 'flex-start',
              paddingBottom: i === items.length - 1 ? 0 : 12,
              borderBottom: i === items.length - 1 ? 'none' : `1px solid ${C.lineSoft}`,
            }}>
              <span style={{
                width: 4, alignSelf: 'stretch', borderRadius: 2, background: it.accent, flexShrink: 0,
              }} />
              <div style={{ flex: 1 }}>
                <div className="headline" style={{ fontSize: 15, color: C.ink, marginBottom: 2 }}>
                  {it.title}
                </div>
                <div style={{ fontSize: 12.5, color: C.inkSoft, lineHeight: 1.5 }}>{it.body}</div>
              </div>
            </div>
          ))}
        </div>
      )}
    </Card>
  );
}

// POSITION INVESTMENT MEMO CARD
// ══════════════════════════════════════════════════════════════════
function botOpinion(pnlPct) {
  // No stop/target on equity positions in current data — derive from raw P&L percent
  if (pnlPct <= -10) return { label: 'Stop-watch', color: C.loss };
  if (pnlPct >= 15) return { label: 'Confident', color: C.gain };
  if (pnlPct < 0) return { label: 'Decaying', color: C.warn };
  return { label: 'Building', color: C.gain };
}

function ScoreBreakdown({ es }) {
  // Pull what we have from entry_signals; show dimensional contribution
  const items = [
    { label: 'Volume', val: es?.volume_acceleration ? Math.min(100, es.volume_acceleration * 10) : null, color: C.coral },
    { label: 'Float', val: es?.float_shares ? (es.float_shares < 5e6 ? 90 : es.float_shares < 20e6 ? 70 : es.float_shares < 100e6 ? 40 : 20) : null, color: C.warn },
    { label: 'Short', val: es?.short_pct ? Math.min(100, (es.short_pct < 1 ? es.short_pct * 100 : es.short_pct) * 3) : null, color: C.tier_s_alt || '#b388ff' },
    { label: 'Catalyst', val: es?.has_catalyst === true ? 80 : es?.has_catalyst === false ? 20 : null, color: C.gain },
  ].filter(x => x.val != null);
  if (items.length === 0) return null;
  return (
    <div style={{ display: 'flex', gap: 6, marginTop: 10 }}>
      {items.map((it, i) => (
        <div key={i} style={{ flex: 1 }}>
          <div style={{ fontSize: 9, color: C.inkDim, marginBottom: 3, fontWeight: 500 }}>{it.label}</div>
          <div style={{ height: 4, background: C.bgElev2, borderRadius: 2, overflow: 'hidden' }}>
            <div style={{ width: `${Math.max(4, it.val)}%`, height: '100%', background: it.color, opacity: 0.85 }} />
          </div>
        </div>
      ))}
    </div>
  );
}

function PositionMemoCard({ pos, reflection, symbolMemory }) {
  const plPct = parseFloat(pos.unrealized_plpc) * 100;
  const plDollar = parseFloat(pos.unrealized_pl);
  const intraday = parseFloat(pos.unrealized_intraday_plpc) * 100;
  const es = pos.entry_signals || {};
  const tier = es.tier || (es.scanner_pick && es.scanner_pick.tier) || null;

  // Daily reflection verdict for this position (rule-based thesis check)
  const reflRow = (reflection?.positions || []).find(r => r.symbol === pos.symbol);
  // Per-symbol historical memory (n trades, win rate, scoring modifier)
  const memBlob = symbolMemory?.symbols?.[pos.symbol];
  const memSummary = memBlob?.summary;
  const thesis = es.thesis
    || (es.scanner_pick && es.scanner_pick.reasoning)
    || (es.scanner_pick && es.scanner_pick.thesis)
    || null;
  // A position without any scanner thesis is almost always a hedge/ETF/manual
  // buy (SPY, IYT, MPLX) rather than a scanner pick. Surface that explicitly
  // instead of pretending a thesis is "missing" — it never existed.
  const isLikelyHedge = !thesis && /^(SPY|QQQ|IWM|DIA|IYT|MPLX|VTI|VOO)$/.test(pos.symbol || '');
  const opinion = botOpinion(plPct);

  // Synthetic intraday sparkline — single point trail (we don't have intraday series)
  const sparkValues = [
    parseFloat(pos.lastday_price),
    parseFloat(pos.current_price),
  ].filter(v => !isNaN(v));

  return (
    <div style={{
      background: C.bgElev,
      border: `1px solid ${C.line}`,
      borderRadius: 12,
      padding: 16,
      marginBottom: 10,
    }}>
      <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', gap: 8, marginBottom: 8 }}>
        <div style={{ display: 'flex', alignItems: 'center', gap: 10 }}>
          <span className="headline" style={{ fontSize: 22, color: C.ink, letterSpacing: '-0.01em' }}>
            {pos.symbol}
          </span>
          {tier && <TierBadge tier={tier} />}
        </div>
        <div style={{ textAlign: 'right' }}>
          <div className="mono" style={{ fontSize: 18, fontWeight: 600, color: pnlColor(plPct), lineHeight: 1.1 }}>
            {fmtPct(plPct, 1)}
          </div>
          <div className="mono caption" style={{ color: pnlColor(plDollar) }}>
            {plDollar >= 0 ? '+' : ''}{fmt$(plDollar)}
          </div>
        </div>
      </div>

      {thesis ? (
        <div style={{ fontSize: 13, color: C.inkSoft, lineHeight: 1.55, marginTop: 4 }}>
          {thesis.split('[Raw:')[0].trim()}
        </div>
      ) : isLikelyHedge ? (
        <div style={{ fontSize: 12, color: C.inkDim, fontStyle: 'italic', marginTop: 4 }}>
          Hedge or market exposure. Not a scanner pick.
        </div>
      ) : (
        <div style={{ fontSize: 12, color: C.inkDim, fontStyle: 'italic', marginTop: 4 }}>
          Entry thesis being recovered from scan history.
        </div>
      )}

      {/* ScoreBreakdown bars cut 2026-05-26: per-symbol scoring math is internal state,
          not actionable at a glance. Component still defined upstream in case a debug
          view wants to render it. */}

      <div style={{ display: 'flex', alignItems: 'center', gap: 10, marginTop: 12, fontSize: 11.5 }}>
        <Pill color={opinion.color} bg={`${opinion.color === C.gain ? 'rgba(110,199,125,0.10)' : opinion.color === C.loss ? 'rgba(232,93,93,0.10)' : 'rgba(212,166,74,0.10)'}`} border={opinion.color === C.gain ? 'rgba(110,199,125,0.3)' : opinion.color === C.loss ? 'rgba(232,93,93,0.3)' : 'rgba(212,166,74,0.3)'}>
          {opinion.label}
        </Pill>
        <span className="mono caption" style={{ color: C.inkDim }}>
          @ ${parseFloat(pos.avg_entry_price).toFixed(2)} → ${parseFloat(pos.current_price).toFixed(2)}
        </span>
        <span className="caption" style={{ marginLeft: 'auto', color: pnlColor(intraday) }}>
          Today {fmtPct(intraday, 2)}
        </span>
      </div>

      {/* Daily reflection verdict. Collapsed to a one-line footer when the
          verdict is intact AND the recommendation is HOLD/TRAIL (the boring
          case for ~all positions). Full block only appears when the bot has
          something non-routine to say. */}
      {reflRow && (() => {
        const isBoring =
          reflRow.verdict === 'thesis_intact'
          && /^(HOLD|TRAIL)/i.test(reflRow.recommendation || '');
        if (isBoring) {
          return (
            <div style={{
              marginTop: 10, paddingTop: 8,
              borderTop: `1px dashed ${C.lineSoft}`,
              display: 'flex', alignItems: 'center', gap: 8, flexWrap: 'wrap',
              fontSize: 11, color: C.inkDim,
            }}>
              <span style={{
                fontSize: 10, fontWeight: 700, letterSpacing: 0.4,
                padding: '1px 6px', borderRadius: 4,
                background: 'rgba(110,199,125,0.10)', color: C.gain,
              }}>
                {(reflRow.recommendation || 'HOLD').split(/[.,]/)[0].trim()}
              </span>
              {reflRow.days_held != null && (
                <span>held {reflRow.days_held}d</span>
              )}
              {reflRow.peak_pnl_pct != null && (
                <span>· peak {reflRow.peak_pnl_pct.toFixed(1)}%</span>
              )}
            </div>
          );

        return (
          <div style={{
            marginTop: 12, paddingTop: 12,
            borderTop: `1px dashed ${C.lineSoft}`,
          }}>
            <div style={{ display: 'flex', alignItems: 'center', gap: 8, marginBottom: 6 }}>
              <span style={{
                fontSize: 10, fontWeight: 700, letterSpacing: 0.5,
                padding: '2px 6px', borderRadius: 4,
                background: reflRow.verdict === 'thesis_intact' ? 'rgba(110,199,125,0.18)'
                          : reflRow.verdict === 'thesis_weakening' ? 'rgba(212,166,74,0.18)'
                          : 'rgba(232,93,93,0.18)',
                color: reflRow.verdict === 'thesis_intact' ? C.gain
                     : reflRow.verdict === 'thesis_weakening' ? C.warn
                     : C.loss,
              }}>
                {reflRow.verdict === 'thesis_intact' ? 'THESIS INTACT'
                 : reflRow.verdict === 'thesis_weakening' ? 'THESIS WEAKENING'
                 : 'THESIS INVALIDATED'}
              </span>
              <span style={{ fontSize: 11, color: C.ink, fontWeight: 600 }}>
                {reflRow.recommendation}
              </span>
              {reflRow.days_held != null && (
                <span style={{ fontSize: 10.5, color: C.inkDim, marginLeft: 'auto' }}>
                  held {reflRow.days_held}d
                  {reflRow.peak_pnl_pct != null && ` · peak ${reflRow.peak_pnl_pct.toFixed(1)}%`}
                </span>
              )}
            </div>
            {(reflRow.reasons || []).slice(0, 3).map((r, i) => (
              <div key={i} style={{ fontSize: 11.5, color: C.inkSoft, lineHeight: 1.45, paddingLeft: 8 }}>
                · {r}
              </div>
            ))}
          </div>
        );
      })()}

      {/* Per-symbol memory — track record for this ticker across all prior
          trades. Shows up only if we've traded the symbol >= 2x; below
          that the sample is too thin for an opinion. */}
      {memSummary && memSummary.n >= 2 && (
        <div style={{
          marginTop: 10, paddingTop: 10,
          borderTop: `1px dashed ${C.lineSoft}`,
          fontSize: 11, color: C.inkDim,
          display: 'flex', alignItems: 'center', gap: 8, flexWrap: 'wrap',
        }}>
          <span style={{ fontWeight: 700, color: C.inkSoft, letterSpacing: 0.4 }}>HISTORY</span>
          <span>{memSummary.n} prior trades</span>
          <span>·</span>
          <span>{(memSummary.hit_rate * 100).toFixed(0)}% WR</span>
          <span>·</span>

          </span>
          {memSummary.score_modifier && memSummary.score_modifier !== 0 && (
            <span style={{
              marginLeft: 'auto',
              fontWeight: 700,
              color: memSummary.score_modifier > 0 ? C.gain : C.loss,
            }}>
              memory: {memSummary.score_modifier > 0 ? '+' : ''}{memSummary.score_modifier} pts
            </span>
          )}
        </div>
      )}
    </div>
  );
}

// BOT JOURNAL ENTRY
// ══════════════════════════════════════════════════════════════════
function buildJournalEntry(v2Data, positions, closedTrades, regime) {
  if (!v2Data) return null;
  const candidates = v2Data.candidates_discovered;
  const evaluated = v2Data.candidates_evaluated;
  const ready = v2Data.ready_to_trade;
  const picks = (v2Data.top_picks || []).length;
  const today = new Date().toISOString().slice(0, 10);
  const todayCloses = (closedTrades || []).filter(t => t.date === today);
  const wins = todayCloses.filter(t => (t.pnl_pct || 0) > 0);
  const losses = todayCloses.filter(t => (t.pnl_pct || 0) < 0);

  // Find a surprising winner
  const sortedPos = [...(positions || [])].sort((a, b) =>
    parseFloat(b.unrealized_plpc) - parseFloat(a.unrealized_plpc)
  );
  const topRunner = sortedPos[0];
  const topRunnerPct = topRunner ? parseFloat(topRunner.unrealized_plpc) * 100 : null;
  const topRunnerTier = topRunner?.entry_signals?.tier;

  // Tomorrow watch — pick highest-scored top pick not in book
  const heldSet = new Set((positions || []).map(p => p.symbol));
  const tomorrowWatch = (v2Data.top_picks || []).find(p => !heldSet.has(p.symbol));

  let para1 = `Scanned ${candidates ?? '—'} candidates, ${evaluated ?? '—'} survived anti-chase, ${ready ?? 0} ready to trade. `;
  para1 += todayCloses.length > 0
    ? `Closed ${todayCloses.length} (${wins.length} green, ${losses.length} red). `
    : `No closes today. `;
  if (topRunner && topRunnerPct >= 5) {
    para1 += `${topRunner.symbol} leading at +${topRunnerPct.toFixed(1)}%${topRunnerTier ? `, ${topRunnerTier}-tier entry` : ''}. `;
  } else if (topRunner && topRunnerPct < -5) {
    para1 += `${topRunner.symbol} worst at ${topRunnerPct.toFixed(1)}%, watch for stop. `;
  }

  let para2 = '';
  if (regime?.regime === 'red') {
    para2 += `Regime red. Sizing down. `;
  } else if (regime?.regime === 'green') {
    para2 += `Regime green. `;
  } else if (regime?.stub) {
    para2 += `Regime feed offline. `;
  }
  if (tomorrowWatch) {
    para2 += `Watching ${tomorrowWatch.symbol} tomorrow (score ${tomorrowWatch.score}, ${tomorrowWatch.conviction}-tier).`;
  } else {
    para2 += `Next scan at 6:30 ET.`;
  }
  return [para1.trim(), para2.trim()];
}

function BotJournal({ v2Data, positions, closedTrades, regime }) {
  const paras = buildJournalEntry(v2Data, positions, closedTrades, regime);
  return (
    <Card style={{ marginBottom: 14 }} padding={18}>
      <SectionTitle hint="generated client-side from today's data">Bot Journal</SectionTitle>
      {!paras ? (
        <EmptyState msg="Journal entry generates after market close, once today's scan and trade data is in v2_dashboard.json." />
      ) : (
        <div style={{ fontSize: 14, color: C.inkSoft, lineHeight: 1.65 }}>
          <p style={{ margin: '0 0 12px' }}>{paras[0]}</p>
          <p style={{ margin: 0 }}>{paras[1]}</p>
        </div>
      )}
    </Card>
  );
}

function MonthTab({ health, equityHistory, closedTrades, optionsData, v2Data, regime, reflection, symbolMemory, missed }) {
  const stats = health?.stats || {};
  const positions = health?.positions || [];
  const startEq = startingEquity(health);
  const equity = stats.equity || startEq;

  // Split real positions from dust (sub-$5 market value, typically fractional
  // residue from a manual close that left 0.0028 SPY shares behind). Dust
  // gets a small footnote rather than a full Position Memo card. UI audit
  // 2026-05-12 flagged the SPY $2 fractional residue rendering as if it were
  // a real position.
  const DUST_THRESHOLD_USD = 5;
  const realPositions = useMemo(
    () => positions.filter(p => Math.abs(parseFloat(p.market_value) || 0) >= DUST_THRESHOLD_USD),
    [positions],
  );
  const dustPositions = useMemo(
    () => positions.filter(p => Math.abs(parseFloat(p.market_value) || 0) < DUST_THRESHOLD_USD),
    [positions],
  );
  const sortedPositions = useMemo(() => [...realPositions].sort((a, b) =>
    parseFloat(b.unrealized_plpc) - parseFloat(a.unrealized_plpc)
  ), [realPositions]);

  return (
    <div>
      <HeroPnL
        equity={equity}
        equityHistory={equityHistory}
        optionsTotals={optionsData?.totals}
        startingEquity={startEq}
      />
      <RegimeWeatherStrip regime={regime} />
      <div style={{ padding: '0 14px 8px' }}>
        <AttentionQueue
          positions={positions}
          v2Data={v2Data}
          optionsData={optionsData}
          missed={missed}
        />

        <div style={{ marginBottom: 14 }}>
          <SectionTitle hint={`${realPositions.length} open${dustPositions.length ? ` · ${dustPositions.length} dust` : ''}`}>Position Memos</SectionTitle>
          {realPositions.length === 0 ? (
            <Card><EmptyState msg="No open positions. Bot waiting for next entry trigger." /></Card>
          ) : (
            sortedPositions.map(pos => (
              <PositionMemoCard
                key={pos.symbol}
                pos={pos}
                reflection={reflection}
                symbolMemory={symbolMemory}
              />
            ))
          )}
          {dustPositions.length > 0 && (
            <div style={{
              marginTop: 4, padding: '8px 12px',
              background: 'transparent',
              border: `1px dashed ${C.lineSoft}`,
              borderRadius: 8,
              fontSize: 11, color: C.inkDim, lineHeight: 1.5,
            }}>
              <span style={{ fontWeight: 700, color: C.inkSoft, letterSpacing: 0.4 }}>DUST · </span>
              {dustPositions.map(p => `${p.symbol} (${parseFloat(p.qty).toFixed(4)} sh, $${parseFloat(p.market_value).toFixed(2)})`).join(' · ')}
              <span style={{ marginLeft: 6, fontStyle: 'italic' }}>
                fractional residue from manual closes. Safe to ignore.
              </span>
            </div>
          )}
        </div>

        <BotJournal v2Data={v2Data} positions={positions} closedTrades={closedTrades} regime={regime} />
      </div>
    </div>
  );
}

// ══════════════════════════════════════════════════════════════════
// MIND TAB — weight drift chart + adjustment log + lessons
// ══════════════════════════════════════════════════════════════════
const SIGNAL_COLORS = {
  composite_score:      '#ff6f5e',
  float_shares:         '#d4a64a',
  short_pct:            '#b388ff',
  has_catalyst:         '#6ec77d',
  volume_acceleration:  '#5ec4f0',
  rvol:                 '#f08bd4',
};

function WeightDriftChart({ driftData }) {
  if (!driftData || driftData.length < 2) {
    return <EmptyState msg="Drift chart populates after nightly learning runs accumulate at least two cycles." />;
  }
  const cleaned = driftData.filter(d => d.signal && d.signal !== '_summary');
  // Group by signal
  const bySignal = {};
  for (const d of cleaned) {
    if (!bySignal[d.signal]) bySignal[d.signal] = [];
    bySignal[d.signal].push(d);
  }
  // Build x-axis as union of timestamps
  const timestamps = [...new Set(cleaned.map(d => d.ts))].sort();
  if (timestamps.length < 2) {
    return <EmptyState msg="Need at least 2 learning cycles to chart weight drift." />;
  }
  const tIndex = Object.fromEntries(timestamps.map((t, i) => [t, i]));

  const W = 400, H = 140, PAD_L = 36, PAD_B = 24, PAD_T = 8, PAD_R = 12;
  const innerW = W - PAD_L - PAD_R;
  const innerH = H - PAD_T - PAD_B;

  // Y range across all weights observed
  const allWeights = cleaned.flatMap(d => [d.old_weight, d.new_weight]).filter(v => v != null);
  const minW = Math.min(...allWeights);
  const maxW = Math.max(...allWeights);
  const yRange = (maxW - minW) || 1;
  const minWPad = minW - yRange * 0.1;
  const maxWPad = maxW + yRange * 0.1;
  const yRangeP = maxWPad - minWPad;

  const toX = i => PAD_L + (i / (timestamps.length - 1)) * innerW;
  const toY = w => PAD_T + innerH - ((w - minWPad) / yRangeP) * innerH;

  const lines = Object.entries(bySignal).map(([sig, entries]) => {
    const sorted = [...entries].sort((a, b) => a.ts.localeCompare(b.ts));
    const pts = sorted.map(e => `${toX(tIndex[e.ts]).toFixed(1)},${toY(e.new_weight).toFixed(1)}`).join(' ');
    return { sig, pts, color: SIGNAL_COLORS[sig] || '#a89c8a' };
  });

  const startDate = new Date(timestamps[0]).toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
  const endDate = new Date(timestamps[timestamps.length - 1]).toLocaleDateString('en-US', { month: 'short', day: 'numeric' });

  return (
    <div>
      <svg width="100%" height={H} viewBox={`0 0 ${W} ${H}`} preserveAspectRatio="none" style={{ display: 'block' }}>
        {/* Y gridlines */}
        {[0, 0.25, 0.5, 0.75, 1].map(t => {
          const y = PAD_T + innerH - t * innerH;
          const w = minWPad + t * yRangeP;
          return (
            <g key={t}>
              <line x1={PAD_L} x2={W - PAD_R} y1={y} y2={y} stroke="#322b23" strokeWidth="1" />
              <text x={PAD_L - 6} y={y + 3} textAnchor="end" fontSize="9" fill="#7a7064" fontFamily="JetBrains Mono">
                {w.toFixed(2)}
              </text>
            </g>
          );
        })}
        {/* X-axis end labels */}
        <text x={PAD_L} y={H - 6} fontSize="9" fill="#7a7064" fontFamily="Inter">{startDate}</text>
        <text x={W - PAD_R} y={H - 6} textAnchor="end" fontSize="9" fill="#7a7064" fontFamily="Inter">{endDate}</text>
        {/* Lines */}
        {lines.map(l => (
          <polyline key={l.sig} points={l.pts} fill="none" stroke={l.color} strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round" />
        ))}
      </svg>
      <div style={{ display: 'flex', flexWrap: 'wrap', gap: 10, marginTop: 8 }}>
        {lines.map(l => (
          <div key={l.sig} style={{ display: 'flex', alignItems: 'center', gap: 5 }}>
            <span style={{ width: 10, height: 2, background: l.color, borderRadius: 1 }} />
            <span style={{ fontSize: 10.5, color: C.inkMute }}>{l.sig.replace(/_/g, ' ')}</span>
          </div>
        ))}
      </div>
    </div>
  );
}

function AdjustmentLog({ driftData }) {

function buildLessons(closedTrades) {
  // Sample-size gating per audit 2026-05-26: cohort and tier lessons need
  // n>=20 per bucket to be worth showing. Below that they're noise. The
  // stop-out RISK lesson stays at n>=3 because it surfaces a real problem
  // (entry filter too loose) even with thin data.
  if (!closedTrades || closedTrades.length < 4) return [];
  const lessons = [];
  // Stop-out frequency. This is the only one that matters at low N.
  const stopOuts = closedTrades.filter(t => (t.reason || '').toLowerCase().includes('stop'));
  if (stopOuts.length >= 3) {
    const pct = stopOuts.length / closedTrades.length * 100;
    if (pct >= 30) {
      lessons.push({
        tag: 'risk',
        body: `${stopOuts.length} of last ${closedTrades.length} closes were hard stops (${pct.toFixed(0)}%). Entry filter likely too loose.`
      });
    }
  }
  // Tier comparison, only at n>=20 per bucket.
  const tierStats = {};
  for (const t of closedTrades) {
    const tier = t.entry_signals?.tier;
    if (!tier) continue;
    if (!tierStats[tier]) tierStats[tier] = { ret: 0, n: 0 };
    tierStats[tier].ret += (t.pnl_pct || 0);
    tierStats[tier].n++;
  }
  const tierAvgs = Object.entries(tierStats)
    .filter(([, s]) => s.n >= 20)
    .map(([t, s]) => ({ tier: t, avg: s.ret / s.n, n: s.n }));
  if (tierAvgs.length >= 2) {
    tierAvgs.sort((a, b) => b.avg - a.avg);
    lessons.push({
      tag: 'tier',
      body: `Tier ${tierAvgs[0].tier} leading at ${tierAvgs[0].avg.toFixed(1)}% avg (n=${tierAvgs[0].n}). Tier ${tierAvgs[tierAvgs.length-1].tier} trailing at ${tierAvgs[tierAvgs.length-1].avg.toFixed(1)}% (n=${tierAvgs[tierAvgs.length-1].n}).`
    });
  }
  // Cohort lesson stays gated at n>=20 per cell too.
  const groups = {};
  for (const t of closedTrades) {
    const tier = t.entry_signals?.tier;
    const cat = t.entry_signals?.has_catalyst;
    if (!tier) continue;
    const key = `${tier}|${cat ? 'cat' : 'nocat'}`;
    if (!groups[key]) groups[key] = { ret: 0, n: 0, wins: 0 };
    groups[key].ret += (t.pnl_pct || 0);
    groups[key].n++;
    if ((t.pnl_pct || 0) > 0) groups[key].wins++;
  }
  if (groups['S|nocat'] && groups['A|cat']
      && groups['S|nocat'].n >= 20 && groups['A|cat'].n >= 20) {
    const sAvg = groups['S|nocat'].ret / groups['S|nocat'].n;
    const aAvg = groups['A|cat'].ret / groups['A|cat'].n;
    const delta = aAvg - sAvg;
    if (Math.abs(delta) >= 1) {
      lessons.push({
        tag: 'cohort',
        body: `S-tier no-catalyst ${delta > 0 ? 'underperforms' : 'outperforms'} A-tier catalyst by ${Math.abs(delta).toFixed(1)}% per trade.`
      });
    }
  }
  return lessons.slice(0, 4);
}

function LessonsCard({ closedTrades }) {
  const lessons = buildLessons(closedTrades);
  // Empty placeholder removed 2026-05-26. If buildLessons gates out everything
  // (low N), don't render a card at all — silence is more honest than a
  // placeholder explaining why there's no content.
  if (lessons.length === 0) return null;
  return (
    <Card style={{ marginBottom: 14 }} padding={18}>
      <SectionTitle hint={`${closedTrades?.length || 0} closes`}>Lessons</SectionTitle>
      <div style={{ display: 'flex', flexDirection: 'column', gap: 12 }}>

            </div>

  );
}

function DecisionFunnel({ v2Data }) {
  const candidates = v2Data?.candidates_discovered;
  const evaluated  = v2Data?.candidates_evaluated;
  const ready      = v2Data?.ready_to_trade;
  const picks      = (v2Data?.top_picks || []).length;

  if (!v2Data) return <EmptyState msg="Funnel pending. First scan publishes after market open." />;
  if (candidates == null && evaluated == null) return <EmptyState msg="Funnel populates after next scan run." />;

  const steps = [
    { label: 'Candidates discovered', val: candidates, color: '#5ec4f0' },
    { label: 'Anti-chase filter',     val: evaluated,  color: C.warn,  note: candidates != null && evaluated != null ? `−${candidates - evaluated} cut` : null },
    { label: 'Score filter',          val: ready,      color: C.gain,  note: evaluated != null && ready != null ? `−${evaluated - ready} cut` : null },
    { label: 'Bought',                val: picks,      color: C.tier_s_alt || '#b388ff' },
  ].filter(s => s.val != null);

  const maxVal = Math.max(...steps.map(s => s.val), 1);

  return (
    <div>
      {steps.map((s, i) => {
        const barW = Math.max(8, (s.val / maxVal) * 100);
        return (
          <div key={i} style={{ marginBottom: 14 }}>
            <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'baseline', marginBottom: 5 }}>
              <span style={{ fontSize: 13.5, color: C.ink }}>{s.label}</span>
              <span className="mono" style={{ fontSize: 14, fontWeight: 600, color: s.color }}>
                {s.val}
                {s.note && <span style={{ fontSize: 11, color: C.loss, marginLeft: 8, fontWeight: 500 }}>{s.note}</span>}
              </span>
            </div>
            <div style={{ height: 6, background: C.bgElev2, borderRadius: 3, overflow: 'hidden' }}>
              <div style={{ height: '100%', width: `${barW}%`, background: s.color, borderRadius: 3, opacity: 0.9 }} />
            </div>
          </div>
        );
      })}
      {v2Data?.timestamp && (
        <div className="caption" style={{ marginTop: 4, textAlign: 'right' }}>
          Last scan {fmtAge(v2Data.timestamp)}
        </div>
      )}
    </div>
  );
}

function SignalEdgeCard({ learningEval }) {
  // Reads data/learning_eval_report.json (fixed 2026-05-12 to source from
  // closed_trades.json). For each signal flag, shows the "edge" — the win-
  // rate gap between trades where the signal fired vs where it didn't.
  // This is the bot's self-measurement: which signals are actually pulling
  // their weight in the scoring. Currently a giant blind spot on the
  // dashboard until tonight.
  if (!learningEval) {
    return (
      <Card style={{ marginBottom: 14 }} padding={18}>
        <SectionTitle hint="per-signal edge">Signal Edge</SectionTitle>
        <div style={{ fontSize: 13, color: C.inkDim }}>
          Waiting for learning_eval_report.json …
        </div>
      </Card>
    );
  }
  const bySignal = learningEval.by_signal || {};
  // Order by absolute edge magnitude descending. Hide insufficient-data rows
  // entirely (per dashboard audit 2026-05-26: don't show empty placeholders
  // when the sample-size gate has held).
  const rows = Object.entries(bySignal)
    .map(([name, blob]) => ({ name, ...blob }))
    .filter(r => !(r.verdict || '').startsWith('insufficient'))
    .sort((a, b) => Math.abs(b.edge || 0) - Math.abs(a.edge || 0));
  const hiddenCount = Object.keys(bySignal).length - rows.length;

  if (rows.length === 0) {
    return (
      <Card style={{ marginBottom: 14 }} padding={18}>
        <SectionTitle hint={`${learningEval.total_trades || 0} trades`}>Signal Edge</SectionTitle>
        <div style={{ fontSize: 13, color: C.inkDim }}>
          No signal has enough fires yet to measure edge. Hidden: {hiddenCount}.
        </div>
      </Card>
    );
  }

  return (
    <Card style={{ marginBottom: 14 }} padding={18}>
      <SectionTitle hint={`${learningEval.total_trades || 0} trades`}>Signal Edge</SectionTitle>
      <div style={{ fontSize: 12, color: C.inkDim, marginBottom: 12, lineHeight: 1.5 }}>
        Win-rate gap when each signal fired vs didn't. Positive edge means the signal predicts wins.
        {hiddenCount > 0 && ` ${hiddenCount} signal${hiddenCount === 1 ? '' : 's'} hidden for insufficient sample.`}
      </div>
      <div style={{ display: 'flex', flexDirection: 'column', gap: 8 }}>
        {rows.map(r => {
          const edge = r.edge;
          const verdict = r.verdict || '';
          const insufficient = (verdict || '').startsWith('insufficient');
          const accent = insufficient ? C.inkDim
            : verdict.startsWith('strong_positive') ? C.gain
            : verdict.startsWith('positive') ? C.gain
            : verdict.startsWith('neutral') ? C.warn
            : verdict.startsWith('negative') ? C.loss
            : verdict.startsWith('strong_negative') ? C.loss
            : C.inkDim;
          const friendly = (r.name || '').replace(/^has_/, '').replace(/_/g, ' ');
          return (
            <div key={r.name} style={{
              display: 'flex', alignItems: 'center', gap: 10,
              padding: '8px 0',
              borderBottom: `1px solid ${C.lineSoft}`,
            }}>
              <span style={{
                width: 4, alignSelf: 'stretch', borderRadius: 2,
                background: accent, flexShrink: 0,
              }} />
              <div style={{ flex: 1, minWidth: 0 }}>
                <div style={{ fontSize: 13.5, fontWeight: 600, color: C.ink, textTransform: 'capitalize' }}>
                  {friendly}
                </div>
                <div style={{ fontSize: 11, color: C.inkDim, marginTop: 2 }}>
                  fired n={r.fired?.n ?? 0} · WR {r.fired?.win_rate != null ? (r.fired.win_rate * 100).toFixed(0) + '%' : '—'}
                  {'  ·  '}
                  not fired n={r.not_fired?.n ?? 0} · WR {r.not_fired?.win_rate != null ? (r.not_fired.win_rate * 100).toFixed(0) + '%' : '—'}
                </div>
              </div>
              <div style={{ textAlign: 'right', minWidth: 80 }}>
                <div className="mono" style={{ fontSize: 14, fontWeight: 700, color: accent }}>
                  {edge != null ? (edge >= 0 ? '+' : '') + (edge * 100).toFixed(1) + ' pts' : '—'}
                </div>
                <div style={{ fontSize: 10, color: C.inkDim, textTransform: 'uppercase', letterSpacing: 0.4 }}>
                  {insufficient ? `n<${(r.fired?.n ?? 0) >= (r.not_fired?.n ?? 0) ? r.not_fired?.n ?? 0 : r.fired?.n ?? 0 + 3}` : (verdict || '').replace('_', ' ')}
                </div>
              </div>
            </div>
          );
        })}
      </div>
      {/* Score-bucket breakdown — same data source, different cut */}
      {learningEval.by_score_bucket && (
        <div style={{ marginTop: 14, paddingTop: 14, borderTop: `1px solid ${C.line}` }}>
          <div style={{ fontSize: 11.5, fontWeight: 700, color: C.inkSoft, letterSpacing: 0.5, marginBottom: 8 }}>
            BY SCORE BUCKET
          </div>
          <div style={{ display: 'grid', gridTemplateColumns: 'repeat(auto-fill, minmax(85px, 1fr))', gap: 6 }}>
            {Object.entries(learningEval.by_score_bucket)
              .sort(([a], [b]) => a.localeCompare(b))
              .map(([bucket, stats]) => {
                const wr = stats.win_rate;
                const color = wr == null ? C.inkDim : wr >= 0.4 ? C.gain : wr >= 0.3 ? C.warn : C.loss;
                return (
                  <div key={bucket} style={{
                    background: C.bgElev,
                    border: `1px solid ${C.lineSoft}`,
                    borderRadius: 6, padding: '8px 10px',
                  }}>
                    <div style={{ fontSize: 10.5, color: C.inkDim, letterSpacing: 0.3 }}>{bucket}</div>
                    <div className="mono" style={{ fontSize: 13, fontWeight: 700, color }}>
                      {wr != null ? (wr * 100).toFixed(0) + '%' : '—'}
                    </div>
                    <div className="caption" style={{ fontSize: 10, color: C.inkDim }}>
                      n={stats.n}
                    </div>
                  </div>
                );
              })}
          </div>
        </div>
      )}
    </Card>
  );
}

function MindTab({ v2Data, driftData, regime, closedTrades, learningEval, learningReport }) {
  // Learner gating: when the daily learner is skipped (effective_n below threshold)
  // the WeightDrift/AdjustmentLog data is stale by definition. Replace with a single
  // honest line instead of pretending the charts mean anything.
  const learnerSkipped = !!learningReport?.learner_skipped;
  const lastDriftEntry = (driftData || [])
    .filter(d => d && d.signal && d.signal !== '_summary')
    .slice(-1)[0];
  const lastDriftAgeDays = lastDriftEntry?.ts
    ? Math.floor((Date.now() - new Date(lastDriftEntry.ts).getTime()) / 86400000)
    : null;
  const driftIsStale = learnerSkipped || (lastDriftAgeDays != null && lastDriftAgeDays > 7);

  return (
    <div>
      <div style={{ padding: '14px 14px 8px' }}>
        <SignalEdgeCard learningEval={learningEval} />

        {driftIsStale ? (
          <Card style={{ marginBottom: 14 }} padding={14}>
            <div style={{ fontSize: 12, color: C.inkMute, lineHeight: 1.5 }}>
              <span style={{ fontWeight: 700, color: C.inkSoft, letterSpacing: 0.3 }}>LEARNER GATED. </span>
              {learnerSkipped ? (
                <>
                  effective n={learningReport?.effective_sample_size ?? '?'} below threshold of {learningReport?.min_effective_samples_required ?? '?'}.

                </>
              ) : (
                <>Last weight change was {lastDriftAgeDays}d ago. Nothing to chart this week.</>

          <>

              <SectionTitle hint="learning over time">Weight Drift</SectionTitle>
              <WeightDriftChart driftData={driftData} />
            </Card>

            <Card style={{ marginBottom: 14 }} padding={18}>
              <SectionTitle hint="changelog">Adjustment Log</SectionTitle>
              <AdjustmentLog driftData={driftData} />
            </Card>
          </>
        )}

        <LessonsCard closedTrades={closedTrades} />

        <details style={{
          marginBottom: 14,
          background: C.bgElev,
          border: `1px solid ${C.line}`,
          borderRadius: 14,
          padding: 14,

            cursor: 'pointer', fontSize: 13, color: C.inkSoft, fontWeight: 600,
            listStyle: 'none', display: 'flex', justifyContent: 'space-between', alignItems: 'baseline',
          }}>
            <span>Scanner internals</span>
            <span style={{ fontSize: 11, color: C.inkDim, fontWeight: 500 }}>tap to expand</span>
          </summary>
          <div style={{ marginTop: 12 }}>
            <DecisionFunnel v2Data={v2Data} />
          </div>
        </details>
      </div>
    </div>
  );
}

    ? 'no data'

            <span style={{ fontSize: 11, color: freshColor, fontWeight: 600, marginLeft: 'auto' }}>{freshLabel}</span>
          </div>
          <div style={{ display: 'flex', alignItems: 'flex-end', justifyContent: 'space-between', gap: 12 }}>
            <div className="display" style={{ fontSize: 40, color: C.ink }}>
              {fmt$k(totalPremium)}
            </div>
            <div style={{ textAlign: 'right' }}>
              <div className="mono" style={{ fontSize: 16, color: accent, fontWeight: 600 }}>
                {totalPnl >= 0 ? '+' : ''}{fmt$(totalPnl)}
              </div>
              <div className="caption">unrealized + MTD</div>
            </div>
          </div>
        </div>
      )}

      <div style={{ padding: '0 18px 12px' }}>
        <div style={{ display: 'flex', justifyContent: 'space-between', marginBottom: 6 }}>
          <span style={{ fontSize: 12, color: C.inkMute }}>Daily deploy cap</span>
          <span className="mono" style={{ fontSize: 12, color: capColor, fontWeight: 600 }}>
            {fmt$k(deployed)} / {fmt$k(dailyCap)} · {capPctUsed.toFixed(0)}%
          </span>
        </div>
        <div style={{ height: 8, background: C.bgElev2, borderRadius: 4, overflow: 'hidden' }}>
          <div style={{
            width: capPctUsed + '%', height: '100%',
            background: capColor,
            transition: 'width 0.3s',
          }} />
        </div>
      </div>

      {/* ── Bot status: is the daemon actually running entry/monitor passes? ── */}
      <div style={{ padding: '0 18px 12px' }}>
        <div style={{
          background: C.bgElev, border: `1px solid ${C.lineSoft}`,
          borderRadius: 8, padding: '10px 12px',
          display: 'flex', justifyContent: 'space-between', alignItems: 'center',
          flexWrap: 'wrap', gap: 8,
        }}>
          <div style={{ display: 'flex', alignItems: 'center', gap: 8 }}>
            <span style={{
              width: 8, height: 8, borderRadius: '50%',
              background: bot_state.options_bot_enabled ? C.gain : C.inkDim,
              boxShadow: bot_state.options_bot_enabled ? `0 0 6px ${C.gain}` : 'none',
            }} />
            <span style={{ fontSize: 12, fontWeight: 600, color: C.ink }}>
              {bot_state.options_bot_enabled ? 'Strategy A · LIVE (paper)' : 'Strategy A · DISABLED'}
            </span>
          </div>
          <span style={{ fontSize: 11, color: C.inkDim }}>
            floor {bot_state.conviction_floor || '?'} · {config.max_hold_days || 21}-DTE max · ${config.per_contract_budget || 50}/contract
          </span>
        </div>
        <div style={{ display: 'flex', gap: 16, fontSize: 11, color: C.inkDim, marginTop: 6, flexWrap: 'wrap' }}>
          <span>entry pass: <span style={{ color: C.ink, fontWeight: 600 }}>{fmtRelTime(bot_state.last_entry_pass_at)}</span></span>
          <span>monitor: <span style={{ color: C.ink, fontWeight: 600 }}>{fmtRelTime(bot_state.last_monitor_pass_at)}</span></span>
          <span>today: <span style={{ color: C.ink, fontWeight: 600 }}>{picks_today_count} pick{picks_today_count === 1 ? '' : 's'} seen</span></span>
        </div>
      </div>

      {/* ── Outcomes summary: appears once any positions have closed ── */}
      {outcomes_summary.n_closed > 0 && (
        <div style={{ padding: '0 14px 12px' }}>
          <Card padding={14}>
            <SectionTitle hint={`${outcomes_summary.n_closed} closed`}>Performance</SectionTitle>
            <div style={{ display: 'flex', gap: 18, flexWrap: 'wrap', alignItems: 'baseline', marginTop: 4 }}>
              <span style={{ fontSize: 13 }}>
                Win rate:&nbsp;
                <span className="mono" style={{ color: outcomes_summary.win_rate != null && outcomes_summary.win_rate >= 0.5 ? C.gain : C.warn, fontWeight: 700 }}>
                  {outcomes_summary.win_rate != null ? (outcomes_summary.win_rate * 100).toFixed(0) + '%' : '—'}
                </span>
                <span style={{ color: C.inkDim, marginLeft: 4 }}>({outcomes_summary.wins}W / {outcomes_summary.losses}L)</span>
              </span>
              <span style={{ fontSize: 13 }}>
                Realized:&nbsp;
                <span className="mono" style={{ color: pnlColor(outcomes_summary.realized_pnl_total), fontWeight: 700 }}>
                  {outcomes_summary.realized_pnl_total >= 0 ? '+' : ''}{fmt$(outcomes_summary.realized_pnl_total)}
                </span>
              </span>
            </div>
            {Object.keys(outcomes_summary.by_failure_class || {}).length > 0 && (
              <div style={{ fontSize: 11, color: C.inkDim, marginTop: 8, lineHeight: 1.5 }}>
                Loss buckets: {Object.entries(outcomes_summary.by_failure_class).map(([k, v]) => `${k} (${v})`).join(' · ')}
              </div>
            )}
          </Card>
        </div>
      )}

      {/* ── Pick activity: what the bot considered, accepted, rejected ── */}
      {pick_log_recent.length > 0 && (
        <div style={{ padding: '0 14px 12px' }}>
          <Card padding={14}>
            <SectionTitle hint={`last ${Math.min(pick_log_recent.length, 8)}`}>Pick Activity</SectionTitle>
            <div style={{ display: 'flex', flexDirection: 'column', gap: 8 }}>
              {pick_log_recent.slice().reverse().slice(0, 8).map((p, i) => {
                const ts = p.ts ? new Date(p.ts) : null;
                const tsLabel = ts ? `${String(ts.getHours()).padStart(2,'0')}:${String(ts.getMinutes()).padStart(2,'0')}` : '—';
                const outcome = p.outcome || 'unknown';
                const accentBar = outcome === 'submitted' ? C.gain
                                : outcome === 'rejected_by_gates' ? C.loss
                                : outcome === 'dry_run' ? C.inkDim
                                : C.warn;
                const label = outcome === 'submitted' ? 'OPENED'
                            : outcome === 'rejected_by_gates' ? 'REJECTED'
                            : outcome === 'dry_run' ? 'DRY-RUN'
                            : outcome.toUpperCase();
                const reasons = (p.gate_failures || []).join(' · ');
                return (
                  <div key={i} style={{
                    display: 'flex', gap: 10, alignItems: 'flex-start',
                    paddingBottom: i === Math.min(pick_log_recent.length, 8) - 1 ? 0 : 8,
                    borderBottom: i === Math.min(pick_log_recent.length, 8) - 1 ? 'none' : `1px solid ${C.lineSoft}`,
                  }}>
                    <span style={{ width: 3, alignSelf: 'stretch', borderRadius: 2, background: accentBar, flexShrink: 0 }} />
                    <div style={{ flex: 1, minWidth: 0 }}>
                      <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'baseline', gap: 8 }}>
                        <span style={{ fontSize: 13, fontWeight: 700, color: C.ink }}>{p.ticker || '?'}</span>
                        <span className="mono" style={{ fontSize: 10.5, color: C.inkDim, letterSpacing: 0.4 }}>
                          {tsLabel} · {label}
                        </span>
                      </div>
                      <div style={{ fontSize: 11.5, color: C.inkMute, lineHeight: 1.4, marginTop: 2 }}>
                        {outcome === 'rejected_by_gates' ? reasons || 'gate failure'
                         : outcome === 'submitted' ? `bought 1 @ \$${p.entry_premium || p.mid || '?'} · cost \$${p.entry_cost || ''}`
                         : `mid \$${p.mid || '?'} · ${p.occ_symbol || ''}`}
                      </div>
                    </div>
                  </div>
                );
              })}
            </div>
          </Card>
        </div>
      )}

      <div style={{ padding: '0 14px 8px' }}>
        {alerts.length > 0 && (
          <Card style={{ marginBottom: 14, borderLeft: `2px solid ${C.warn}` }}>
            <div style={{ fontSize: 11, fontWeight: 700, color: C.warn, marginBottom: 6, letterSpacing: 0.4 }}>
              MAX-HOLD COUNTDOWN
            </div>
            {alerts.map((a, i) => (
              <div key={i} style={{ fontSize: 13, color: C.ink }}>
                {a.ticker} ({a.occ_symbol}): {a.max_hold_days_left} day(s) left
              </div>
            ))}
          </Card>
        )}

        {open_positions.length > 0 && (
          <div style={{ marginBottom: 14 }}>
            <SectionTitle hint={`${open_positions.length} open`}>Contract Memos</SectionTitle>
            {open_positions.map((p, i) => <OptionMemoCard key={i} p={p} />)}
          </div>
        )}

        {closes.length > 0 && (
          <Card style={{ marginBottom: 14 }} padding={16}>
            <SectionTitle hint={`${closes.length} this month`}>Recent Closes</SectionTitle>
            <table>
              <thead>
                <tr>
                  {['Ticker','Reason','P&L'].map(h => (
                    <th key={h} style={{ fontSize: 10.5, color: C.inkDim, fontWeight: 500, padding: '0 6px 8px 0' }}>{h}</th>
                  ))}
                </tr>
              </thead>
              <tbody>
                {closes.slice(-15).reverse().map((c, i) => (
                  <tr key={i} style={{ borderTop: `1px solid ${C.lineSoft}` }}>
                    <td style={{ padding: '8px 6px 8px 0', fontWeight: 600, fontSize: 13 }}>{c.ticker}</td>
                    <td style={{ padding: '8px 6px 8px 0', color: C.inkMute, fontSize: 11.5 }}>{c.reason}</td>
                    <td className="mono" style={{ padding: '8px 0', textAlign: 'right', fontWeight: 600, fontSize: 13, color: pnlColor(c.pnl || 0) }}>
                      {c.pnl != null ? fmt$(c.pnl) : '—'}
                    </td>
                  </tr>
                ))}
              </tbody>
            </table>
          </Card>
        )}

        <div className="caption" style={{ textAlign: 'center', paddingBottom: 4 }}>
          Updated {generated_at ? fmtAge(generated_at) : '—'}
        </div>
      </div>
    </div>
  );
}

// ══════════════════════════════════════════════════════════════════
// HEADER + BOTTOM NAV
// ══════════════════════════════════════════════════════════════════
const TABS = [
  { id: 'month',   label: 'Month',   icon: '◈' },
  { id: 'mind',    label: 'Mind',    icon: '◉' },
  { id: 'options', label: 'Options', icon: '⊕' },
];

function BottomTabBar({ active, onChange, optionsVisible = true }) {
  const visibleTabs = TABS.filter(t => t.id !== 'options' || optionsVisible);
  return (
    <div style={{
      position: 'fixed', bottom: 0, left: 0, right: 0,
      height: 60, background: '#16130f', borderTop: `1px solid ${C.line}`,
      display: 'flex', zIndex: 200,
      paddingBottom: 'env(safe-area-inset-bottom, 0)',
    }}>
      {visibleTabs.map(tab => {
        const on = active === tab.id;
        return (
          <button key={tab.id} onClick={() => onChange(tab.id)} style={{
            flex: 1, background: 'none', border: 'none', cursor: 'pointer',
            display: 'flex', flexDirection: 'column', alignItems: 'center',
            justifyContent: 'center', gap: 3, minHeight: 44,
            color: on ? C.coral : '#5a5147',
            transition: 'color 0.15s',
            WebkitTapHighlightColor: 'transparent',
          }}>
            <span style={{ fontSize: 20, lineHeight: 1 }}>{tab.icon}</span>
            <span style={{ fontSize: 11, fontWeight: on ? 600 : 500, letterSpacing: 0.2 }}>{tab.label}</span>
          </button>
        );
      })}
    </div>
  );
}

// ══════════════════════════════════════════════════════════════════
// APP ROOT
// ══════════════════════════════════════════════════════════════════
function App() {
  const [tab, setTab] = useState(() => {
    try {
      const t = new URLSearchParams(window.location.search).get('tab');
      if (t && ['month','mind','options'].includes(t)) return t;
    } catch {}
    return 'month';
  });
  const [tick, setTick] = useState(0);

  useEffect(() => {
    const id = setInterval(() => setTick(t => t + 1), 60000);
    return () => clearInterval(id);
  }, []);

  const health        = usePoll('data/health.json',        HEALTH_POLL_MS);
  const v2Data        = usePoll('data/v2_dashboard.json',  V2_POLL_MS);
  const closedTrades  = usePoll('data/closed_trades.json', CLOSED_POLL_MS);
  const optionsData   = usePoll('data/options_dashboard.json', V2_POLL_MS);
  const equityHistory = useOnce('data/equity_history.json');
  const driftData     = useOnce('data/weight_drift.json');
  const regime        = useOnce('data/regime.json');
  // Daily reflection (per-position thesis re-check). Polls at HEALTH_POLL_MS
  // so it stays in sync with health.json. Written by run_bot.py:eod cycle.
  const reflection    = usePoll('data/reflection_latest.json', HEALTH_POLL_MS);
  // Per-symbol historical track record (n trades, win rate, score modifier).
  const symbolMemory  = useOnce('data/symbol_memory.json');
  // Per-signal edge measurement from learning_eval.py (fixed 2026-05-12 to
  // read closed_trades.json so it produces real numbers instead of zeros).
  const learningEval  = useOnce('data/learning_eval_report.json');
  // Daily learner report (whether weights actually moved, or whether the
  // sample-size gate held). Drives MindTab learner-gated banner.
  const learningReport = useOnce('data/learning_report.json');
  // Today's missed-opportunity tracker (winners the scanner didn't catch).
  const missed         = useOnce('data/missed_opportunities_today.json');

  const stats     = health?.stats || {};
  const equity    = stats.equity;
  const eqPnl     = stats.total_pnl || 0;
  const optPnl    = (optionsData?.totals?.total_open_unrealized_pl || 0)
                  + (optionsData?.totals?.realized_this_month || 0);
  const totalPnl  = eqPnl + optPnl;
  const optsOpen  = optionsData?.open_count || 0;
  // Hide the Options tab entirely when there's no signal there: no open
  // contracts, no closes, no recent pick activity. Per audit 2026-05-26.
  const optionsTabVisible = !optionsData
    || optsOpen > 0
    || (optionsData.closes || []).length > 0
    || (optionsData.pick_log_recent || []).length > 0;

  const now   = new Date();
  const wkday = now.getDay();
  const hour  = now.getHours();
  const inHrs = wkday >= 1 && wkday <= 5 && hour >= 4 && hour < 18;

  // Data freshness — read the actual data timestamp instead of the viewer's
  // wall clock. The previous header lied by showing the user's local time as
  // if it were the data's "as of" time.
  const dataTs = health?.timestamp ? new Date(health.timestamp) : null;
  const dataMins = dataTs ? Math.max(0, Math.round((now - dataTs) / 60000)) : null;
  const freshLabel = dataMins == null
    ? 'no data'
    : dataMins < 1 ? 'updated just now'
    : dataMins < 60 ? `updated ${dataMins}m ago`
    : dataMins < 60 * 24 ? `updated ${Math.round(dataMins / 60)}h ago`
    : `updated ${Math.round(dataMins / 60 / 24)}d ago`;
  const freshColor = dataMins == null
    ? C.loss
    : inHrs
      ? (dataMins >= 60 ? C.loss : dataMins >= 15 ? C.warn : C.gain)
      : (dataMins >= 60 * 24 ? C.loss : dataMins >= 60 * 6 ? C.warn : 'var(--ink-dim)');

  return (
    <div style={{ height: '100vh', display: 'flex', flexDirection: 'column', overflow: 'hidden' }}>
      {/* Header */}
      <div style={{
        background: '#16130f', borderBottom: `1px solid ${C.line}`,
        padding: '12px 16px', display: 'flex', alignItems: 'center',
        justifyContent: 'space-between', flexShrink: 0,
      }}>
        <div style={{ display: 'flex', alignItems: 'center', gap: 8, flexWrap: 'wrap' }}>
          <span className="headline" style={{ fontSize: 17, color: C.coral, letterSpacing: '-0.005em' }}>
            Squeeze Prophet
          </span>
          <Pill color="#5ec4f0" bg="rgba(94,196,240,0.10)" border="rgba(94,196,240,0.3)">PAPER</Pill>
          {inHrs && <Pill color={C.gain} bg={C.gainSoft} border={C.gainLine}>● LIVE</Pill>}
        </div>
        <div style={{ textAlign: 'right' }}>
          {equity != null && (
            <div className="mono" style={{ fontSize: 14, fontWeight: 600, color: pnlColor(totalPnl) }}>
              {fmt$k(equity)} <span style={{ fontSize: 11, fontWeight: 500 }}>
                {totalPnl >= 0 ? '+' : '−'}{fmt$(Math.abs(totalPnl)).replace('$','$')}
              </span>
            </div>
          )}
          <div className="caption" style={{ display: 'flex', gap: 8, justifyContent: 'flex-end', alignItems: 'center' }}>
            <span style={{ color: freshColor, fontWeight: 600 }}>{freshLabel}</span>
            {optsOpen > 0 && <span style={{ color: C.coral }}>· opt {optsOpen} open</span>}
          </div>
        </div>
      </div>

      {/* Scrollable content */}
      <div style={{ flex: 1, overflowY: 'auto', overflowX: 'hidden', paddingBottom: 68 }}>
        {tab === 'month' && (
          <MonthTab
            health={health}
            equityHistory={equityHistory}
            closedTrades={Array.isArray(closedTrades) ? closedTrades : []}
            optionsData={optionsData}
            v2Data={v2Data}
            regime={regime}
            reflection={reflection}
            symbolMemory={symbolMemory}
            missed={missed}
          />
        )}
        {tab === 'mind' && (
          <MindTab
            v2Data={v2Data}
            driftData={driftData}
            regime={regime}
            closedTrades={Array.isArray(closedTrades) ? closedTrades : []}
            learningEval={learningEval}
            learningReport={learningReport}
          />
        )}
        {tab === 'options' && optionsTabVisible && (
          <OptionsTab optionsData={optionsData} equityHistory={equityHistory} />
        )}
      </div>

      <BottomTabBar active={tab} onChange={setTab} optionsVisible={optionsTabVisible} />
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
