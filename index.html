<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#121212">
  <title>Squeeze Prophet</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='75' font-size='75'>⚡</text></svg>">
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; height: 100%; overflow: hidden; }
    body {
      background: #121212;
      color: #e2e8f0;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
      -webkit-font-smoothing: antialiased;
    }
    #root { height: 100%; }
    ::-webkit-scrollbar { width: 3px; }
    ::-webkit-scrollbar-thumb { background: #333; border-radius: 2px; }
    button { font-family: inherit; }
    table { border-collapse: collapse; width: 100%; }
    th, td { text-align: left; }
  </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useId, useRef, useMemo } = React;

// ── Constants ───────────────────────────────────────────────────
const STARTING_EQUITY = 100000;
const HEALTH_POLL_MS  = 30 * 1000;
const V2_POLL_MS      = 5 * 60 * 1000;
const CLOSED_POLL_MS  = 5 * 60 * 1000;
const MTD_TARGET_PCT  = 5.0;  // +5% monthly target

const GAIN    = '#10B981';
const LOSS    = '#F87171';
const SQUEEZE = '#F59E0B';
const CARD_BG = '#1E1E1E';
const MUTED   = '#94a3b8';
const DIM     = '#475569';

const TIER_COLORS = {
  S: { bg: 'rgba(168,85,247,0.18)',  text: '#c084fc', border: 'rgba(168,85,247,0.5)' },
  A: { bg: 'rgba(16,185,129,0.18)',  text: '#10B981', border: 'rgba(16,185,129,0.5)' },
  B: { bg: 'rgba(245,158,11,0.18)',  text: '#F59E0B', border: 'rgba(245,158,11,0.5)' },
  C: { bg: 'rgba(148,163,184,0.10)', text: '#94a3b8', border: 'rgba(100,116,139,0.4)' },
};

// ── Utilities ───────────────────────────────────────────────────
const fmt$ = n => {
  const v = Math.abs(Number(n));
  return (Number(n) < 0 ? '-' : '') + '$' + v.toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
};
const fmt$k = n => {
  const v = Math.abs(Number(n));
  if (v >= 10000) return (Number(n) < 0 ? '-' : '') + '$' + (v / 1000).toFixed(1) + 'k';
  return fmt$(n);
};
const fmtPct = (n, dec = 1) => (Number(n) >= 0 ? '+' : '') + Number(n).toFixed(dec) + '%';
const pnlColor = v => Number(v) >= 0 ? GAIN : LOSS;
const fmtFloat = n => {
  if (!n) return '—';
  const m = n / 1e6;
  return m < 1 ? (n / 1e3).toFixed(0) + 'K' : m < 10 ? m.toFixed(1) + 'M' : Math.round(m) + 'M';
};

function fmtAge(ts) {
  if (!ts) return '—';
  const ms = Date.now() - new Date(ts).getTime();
  const m = Math.floor(ms / 60000);
  if (m < 60) return m + 'm ago';
  return Math.floor(m / 60) + 'h ago';
}

function today() {
  return new Date().toISOString().slice(0, 10);
}

function currentMonthStr() {
  const d = new Date();
  return `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}`;
}

function daysInMonth(year, month) {
  return new Date(year, month, 0).getDate();
}

// ── Data Fetching ───────────────────────────────────────────────
function usePoll(url, ms) {
  const [data, setData] = useState(null);
  useEffect(() => {
    let dead = false;
    const load = () =>
      fetch(url + '?t=' + Date.now(), { cache: 'no-store' })
        .then(r => r.ok ? r.json() : null)
        .then(d => { if (!dead && d) setData(d); })
        .catch(() => {});
    load();
    const id = setInterval(load, ms);
    return () => { dead = true; clearInterval(id); };
  }, [url, ms]);
  return data;
}

function useOnce(url) {
  const [data, setData] = useState(null);
  useEffect(() => {
    fetch(url + '?t=' + Date.now(), { cache: 'no-store' })
      .then(r => r.ok ? r.json() : null)
      .then(d => { if (d) setData(d); })
      .catch(() => {});
  }, [url]);
  return data;
}

// ── Base Components ──────────────────────────────────────────────
function Card({ children, style, leftBorder }) {
  return (
    <div style={{
      background: CARD_BG, borderRadius: 12, padding: 14,
      borderLeft: leftBorder ? `3px solid ${leftBorder}` : undefined,
      ...style,
    }}>{children}</div>
  );
}

function Label({ children, color, style }) {
  return (
    <div style={{
      fontSize: 10, color: color || MUTED, textTransform: 'uppercase',
      letterSpacing: 1, fontWeight: 700, marginBottom: 10, ...style,
    }}>{children}</div>
  );
}

function TierBadge({ tier, sm }) {
  const c = TIER_COLORS[tier] || TIER_COLORS.C;
  return (
    <span style={{
      background: c.bg, color: c.text, border: `1px solid ${c.border}`,
      borderRadius: 4, padding: sm ? '1px 5px' : '2px 7px',
      fontSize: sm ? 9 : 11, fontWeight: 700, letterSpacing: 0.5,
      display: 'inline-block', lineHeight: 1.4,
    }}>{tier}</span>
  );
}

function EmptyState({ msg }) {
  return (
    <div style={{
      textAlign: 'center', padding: '24px 16px', color: DIM,
      fontSize: 12, lineHeight: 1.6,
    }}>
      {msg || 'Insufficient data — first real signals coming after Monday\'s trades'}
    </div>
  );
}

// ── SVG Line Chart ────────────────────────────────────────────────
function LineChart({ data, targetData, height = 100, valueKey = 'equity', dateKey = 'date' }) {
  const uid = useId().replace(/[^a-z0-9]/gi, '');
  if (!data || data.length < 2) return <EmptyState msg="No equity data yet — accumulating after Monday's trades" />;
  const values = data.map(d => typeof d === 'object' ? (d[valueKey] || 0) : d);
  const targets = targetData ? targetData.map(d => typeof d === 'object' ? d[valueKey] : d) : [];
  const allVals = [...values, ...targets].filter(Boolean);
  const minV = Math.min(...allVals) * 0.998;
  const maxV = Math.max(...allVals) * 1.002;
  const range = maxV - minV || 1;
  const W = 400, H = height;
  const toX = i => (i / (values.length - 1)) * W;
  const toY = v => H - 4 - ((v - minV) / range) * (H - 10);
  const pts = values.map((v, i) => `${toX(i).toFixed(1)},${toY(v).toFixed(1)}`).join(' ');
  const areaPts = pts + ` ${W},${H} 0,${H}`;
  const last = values[values.length - 1];
  const lineColor = last >= STARTING_EQUITY ? GAIN : LOSS;
  let tgtPts = '';
  if (targets.length >= 2) {
    tgtPts = targets.map((v, i) => `${(i / (targets.length - 1) * W).toFixed(1)},${toY(v).toFixed(1)}`).join(' ');
  }
  return (
    <svg width="100%" height={height} viewBox={`0 0 ${W} ${H}`} preserveAspectRatio="none" style={{ display: 'block' }}>
      <defs>
        <linearGradient id={`g${uid}`} x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stopColor={lineColor} stopOpacity="0.3"/>
          <stop offset="100%" stopColor={lineColor} stopOpacity="0.02"/>
        </linearGradient>
      </defs>
      <polygon points={areaPts} fill={`url(#g${uid})`} />
      {tgtPts && (
        <polyline points={tgtPts} fill="none" stroke={SQUEEZE}
          strokeWidth="1.5" strokeDasharray="6,4" opacity="0.6" />
      )}
      <polyline points={pts} fill="none" stroke={lineColor}
        strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" />
    </svg>
  );
}

// ══════════════════════════════════════════════════════════════════
// MONTH TAB
// ══════════════════════════════════════════════════════════════════

function buildCohorts(closedTrades) {
  if (!closedTrades || !closedTrades.length) return [];

  const bucket = (key, val) => {
    const cohorts = {};
    for (const t of closedTrades) {
      const s = t.entry_signals || {};
      let bkt = val(s, t);
      if (bkt == null) bkt = 'unknown';
      if (!cohorts[bkt]) cohorts[bkt] = { count: 0, wins: 0, returnSum: 0 };
      cohorts[bkt].count++;
      if ((t.pnl_pct || 0) > 0) cohorts[bkt].wins++;
      cohorts[bkt].returnSum += (t.pnl_pct || 0);
    }
    return Object.entries(cohorts).map(([name, c]) => ({
      dimension: key, name,
      count: c.count,
      winRate: c.count > 0 ? (c.wins / c.count * 100) : 0,
      avgReturn: c.count > 0 ? (c.returnSum / c.count) : 0,
    })).filter(r => r.name !== 'unknown' && r.count > 0)
      .sort((a, b) => b.count - a.count);
  };

  const tierRows = bucket('Tier', (s) => s.tier || null);
  const catalystRows = bucket('Catalyst', (s) => s.has_catalyst == null ? null : (s.has_catalyst ? 'Yes' : 'No'));
  const floatRows = bucket('Float', (s) => {
    const f = s.float_shares;
    if (!f) return null;
    if (f < 5e6) return '<5M (micro)';
    if (f < 20e6) return '5-20M (small)';
    if (f < 100e6) return '20-100M (mid)';
    return '>100M (large)';
  });
  const shortRows = bucket('Short %', (s) => {
    const sp = s.short_pct;
    if (sp == null) return null;
    const pct = sp < 1 ? sp * 100 : sp;  // normalize if stored as decimal
    if (pct > 20) return '>20% (high)';
    if (pct > 10) return '10-20% (med)';
    return '<10% (low)';
  });
  const scoreRows = bucket('Score', (s) => {
    const sc = s.composite_score;
    if (sc == null) return null;
    if (sc >= 80) return '80+ (S-tier)';
    if (sc >= 60) return '60-79 (A-tier)';
    if (sc >= 40) return '40-59 (B-tier)';
    return '<40 (C-tier)';
  });

  return [...tierRows, ...catalystRows, ...scoreRows, ...floatRows, ...shortRows];
}

function CohortTable({ cohorts }) {
  const dims = [...new Set(cohorts.map(r => r.dimension))];
  if (!cohorts.length) return <EmptyState />;
  return (
    <div>
      {dims.map(dim => {
        const rows = cohorts.filter(r => r.dimension === dim);
        return (
          <div key={dim} style={{ marginBottom: 16 }}>
            <div style={{ fontSize: 10, color: '#60a5fa', fontWeight: 700, textTransform: 'uppercase', letterSpacing: 0.8, marginBottom: 6 }}>{dim}</div>
            <table>
              <thead>
                <tr>
                  {['Cohort','n','Win%','Avg Ret'].map(h => (
                    <th key={h} style={{ fontSize: 9, color: DIM, fontWeight: 600, padding: '0 6px 6px 0', textTransform: 'uppercase', letterSpacing: 0.5 }}>{h}</th>
                  ))}
                </tr>
              </thead>
              <tbody>
                {rows.map((r, i) => (
                  <tr key={i} style={{ borderTop: '1px solid #252525' }}>
                    <td style={{ fontSize: 11, color: '#e2e8f0', padding: '6px 6px 6px 0', fontWeight: 500 }}>{r.name}</td>
                    <td style={{ fontSize: 11, color: MUTED, padding: '6px 6px 6px 0' }}>{r.count}</td>
                    <td style={{ fontSize: 11, fontWeight: 700, padding: '6px 6px 6px 0', color: r.winRate >= 50 ? GAIN : r.winRate >= 35 ? SQUEEZE : LOSS }}>
                      {r.winRate.toFixed(0)}%
                    </td>
                    <td style={{ fontSize: 11, fontWeight: 700, padding: '6px 0', color: pnlColor(r.avgReturn) }}>
                      {fmtPct(r.avgReturn, 1)}
                    </td>
                  </tr>
                ))}
              </tbody>
            </table>
          </div>
        );
      })}
    </div>
  );
}

function MonthTab({ health, equityHistory, closedTrades }) {
  const stats = health?.stats || {};
  const positions = health?.positions || [];
  const equity = stats.equity || STARTING_EQUITY;

  const now = new Date();
  const monthStr = currentMonthStr();
  const dayOfMonth = now.getDate();
  const totalDays = daysInMonth(now.getFullYear(), now.getMonth() + 1);
  const daysLeft = totalDays - dayOfMonth;

  // MTD: filter equity_history to current month
  const mtdHistory = useMemo(() => {
    if (!equityHistory || !equityHistory.length) return [];
    return equityHistory.filter(e => (e.date || '').startsWith(monthStr));
  }, [equityHistory, monthStr]);

  const mtdStart = mtdHistory.length > 0 ? (mtdHistory[0].equity || STARTING_EQUITY) : STARTING_EQUITY;
  const mtdCurrent = equity || mtdStart;
  const mtdPct = mtdStart > 0 ? ((mtdCurrent - mtdStart) / mtdStart * 100) : 0;
  const targetEquity = mtdStart * (1 + MTD_TARGET_PCT / 100);

  // Build target line: N+1 points from month-start equity to target
  const targetLine = useMemo(() => {
    const pts = Math.max(mtdHistory.length, 2);
    return Array.from({ length: pts }, (_, i) => ({
      equity: mtdStart + (targetEquity - mtdStart) * (i / (pts - 1))
    }));
  }, [mtdHistory.length, mtdStart, targetEquity]);

  // Closed trades this month
  const mtdTrades = useMemo(() =>
    (closedTrades || []).filter(t => (t.date || '').startsWith(monthStr)),
    [closedTrades, monthStr]
  );
  const mtdWins = mtdTrades.filter(t => (t.pnl_pct || 0) > 0).length;
  const mtdPnl$ = mtdTrades.reduce((s, t) => s + (t.pnl_dollar || 0), 0);

  // Cohort table from ALL closed trades (not just MTD, to have enough data)
  const cohorts = useMemo(() => buildCohorts(closedTrades), [closedTrades]);
  const hasCohortData = cohorts.some(c => c.name !== 'unknown');

  return (
    <div style={{ padding: '12px 16px 8px' }}>
      {/* Hero: MTD P&L */}
      <Card style={{ marginBottom: 12 }}>
        <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'flex-start', marginBottom: 8 }}>
          <div>
            <div style={{ fontSize: 10, color: DIM, textTransform: 'uppercase', letterSpacing: 1, marginBottom: 4 }}>
              MTD P&L — April {now.getFullYear()}
            </div>
            <div style={{ fontSize: 32, fontWeight: 800, color: pnlColor(mtdPct), lineHeight: 1, letterSpacing: -1 }}>
              {fmtPct(mtdPct, 2)}
            </div>
            <div style={{ fontSize: 11, color: pnlColor(mtdPnl$), fontWeight: 600, marginTop: 3 }}>
              {mtdPnl$ >= 0 ? '+' : ''}{fmt$(mtdPnl$)} closed
            </div>
          </div>
          <div style={{ textAlign: 'right' }}>
            <div style={{ fontSize: 10, color: DIM, marginBottom: 4 }}>Target: +{MTD_TARGET_PCT}%</div>
            <div style={{ fontSize: 13, fontWeight: 700, color: SQUEEZE }}>
              {daysLeft}d left
            </div>
            <div style={{ fontSize: 10, color: DIM, marginTop: 2 }}>
              {mtdTrades.length} trades · {mtdTrades.length > 0 ? (mtdWins / mtdTrades.length * 100).toFixed(0) : '—'}% wr
            </div>
          </div>
        </div>
        <LineChart
          data={mtdHistory.length >= 2 ? mtdHistory : null}
          targetData={mtdHistory.length >= 2 ? targetLine : null}
          height={80}
        />
        {mtdHistory.length < 2 && (
          <div style={{ textAlign: 'center', padding: '16px 0 4px', color: DIM, fontSize: 11 }}>
            P&L curve populates as equity snapshots accumulate — starts Monday
          </div>
        )}
        <div style={{ display: 'flex', gap: 8, marginTop: 10, fontSize: 10 }}>
          <span style={{ color: equity >= STARTING_EQUITY ? GAIN : LOSS }}>● Equity</span>
          <span style={{ color: SQUEEZE }}>- - +{MTD_TARGET_PCT}% target</span>
        </div>
      </Card>

      {/* Portfolio attribution */}
      <Card style={{ marginBottom: 12 }}>
        <Label>Portfolio Attribution</Label>
        {positions.length === 0 ? (
          <EmptyState msg="No open positions — attribution shows after Monday open" />
        ) : (
          <div>
            {[...positions]
              .sort((a, b) => parseFloat(b.unrealized_plpc) - parseFloat(a.unrealized_plpc))
              .map(pos => {
                const pnlPct = parseFloat(pos.unrealized_plpc) * 100;
                const pnlDollar = parseFloat(pos.unrealized_pl);
                const totalOpen = positions.reduce((s, p) => s + Math.abs(parseFloat(p.unrealized_pl)), 0.01);
                const share = Math.abs(pnlDollar) / totalOpen * 100;
                return (
                  <div key={pos.symbol} style={{
                    display: 'flex', justifyContent: 'space-between', alignItems: 'center',
                    padding: '7px 0', borderBottom: '1px solid #252525',
                  }}>
                    <div>
                      <span style={{ fontWeight: 700, fontSize: 13, color: '#fff' }}>{pos.symbol}</span>
                      <span style={{ fontSize: 10, color: DIM, marginLeft: 8 }}>
                        {pnlDollar >= 0 ? 'carrying' : 'dragging'} {share.toFixed(0)}%
                      </span>
                    </div>
                    <div style={{ textAlign: 'right' }}>
                      <div style={{ fontSize: 13, fontWeight: 700, color: pnlColor(pnlPct) }}>
                        {fmtPct(pnlPct)}
                      </div>
                      <div style={{ fontSize: 10, color: DIM }}>{fmt$(pnlDollar)}</div>
                    </div>
                  </div>
                );
              })}
          </div>
        )}
      </Card>

      {/* Cohort breakdown */}
      <Card style={{ marginBottom: 12 }}>
        <Label>Cohort Breakdown ({closedTrades?.length || 0} closed trades)</Label>
        {hasCohortData ? (
          <CohortTable cohorts={cohorts} />
        ) : (
          <EmptyState msg={
            closedTrades?.length
              ? 'entry_signals sparsely populated — cohorts fill after Monday trades with DB join active'
              : 'No closed trades yet'
          } />
        )}
      </Card>
    </div>
  );
}

// ══════════════════════════════════════════════════════════════════
// MIND TAB
// ══════════════════════════════════════════════════════════════════

function RegimeGauge({ regime }) {
  if (!regime) return (
    <div style={{ background: '#252525', borderRadius: 10, padding: '10px 14px', minWidth: 140 }}>
      <div style={{ fontSize: 9, color: DIM, fontWeight: 700, textTransform: 'uppercase', marginBottom: 6 }}>Regime</div>
      <div style={{ fontSize: 12, color: DIM }}>Loading…</div>
    </div>
  );

  const color = regime.regime === 'green' ? GAIN : regime.regime === 'red' ? LOSS : SQUEEZE;
  const bg = regime.regime === 'green' ? 'rgba(16,185,129,0.08)' : regime.regime === 'red' ? 'rgba(248,113,113,0.08)' : 'rgba(245,158,11,0.08)';
  const border = regime.regime === 'green' ? 'rgba(16,185,129,0.3)' : regime.regime === 'red' ? 'rgba(248,113,113,0.3)' : 'rgba(245,158,11,0.3)';

  return (
    <div style={{ background: bg, border: `1px solid ${border}`, borderRadius: 10, padding: '10px 14px', minWidth: 150 }}>
      <div style={{ fontSize: 9, color: DIM, fontWeight: 700, textTransform: 'uppercase', marginBottom: 4 }}>Regime</div>
      <div style={{ display: 'flex', alignItems: 'center', gap: 6, marginBottom: 4 }}>
        <div style={{ width: 8, height: 8, borderRadius: '50%', background: color }} />
        <span style={{ fontSize: 11, fontWeight: 700, color }}>{regime.regime?.toUpperCase()}</span>
      </div>
      {regime.iwm_return_20d != null && (
        <div style={{ fontSize: 9, color: DIM, lineHeight: 1.7 }}>
          <div>IWM 20d: <span style={{ color: pnlColor(regime.iwm_return_20d) }}>{fmtPct(regime.iwm_return_20d)}</span></div>
          <div>SPY vol: {regime.spy_realized_vol_20d?.toFixed(1)}%</div>
          {regime.breadth_differential != null && (
            <div>Breadth: <span style={{ color: pnlColor(regime.breadth_differential) }}>{fmtPct(regime.breadth_differential)}</span></div>
          )}
        </div>
      )}
      {regime.stub && <div style={{ fontSize: 8, color: '#444', marginTop: 4 }}>stub — live data unavailable</div>}
    </div>
  );
}

function DecisionFunnel({ v2Data }) {
  const candidates = v2Data?.candidates_discovered;
  const evaluated  = v2Data?.candidates_evaluated;
  const ready      = v2Data?.ready_to_trade;
  const picks      = (v2Data?.top_picks || []).length;

  if (!v2Data) return <EmptyState />;
  if (candidates == null && evaluated == null) return (
    <EmptyState msg="Decision funnel populates after next scan — check back after Monday 6:30 AM" />
  );

  const steps = [
    { label: 'Candidates in',     val: candidates, color: '#60a5fa' },
    { label: 'Anti-chase filter', val: evaluated,  color: SQUEEZE,  note: candidates != null && evaluated != null ? `−${candidates - evaluated} killed` : null },
    { label: 'Score filter',      val: ready,      color: GAIN,     note: evaluated != null && ready != null ? `−${evaluated - ready} killed` : null },
    { label: 'Bought',            val: picks,      color: '#c084fc' },
  ].filter(s => s.val != null);

  const maxVal = Math.max(...steps.map(s => s.val), 1);

  return (
    <div>
      {steps.map((s, i) => {
        const barW = Math.max(8, (s.val / maxVal) * 100);
        return (
          <div key={i} style={{ marginBottom: 10 }}>
            <div style={{ display: 'flex', justifyContent: 'space-between', marginBottom: 3 }}>
              <span style={{ fontSize: 11, color: '#e2e8f0' }}>{s.label}</span>
              <span style={{ fontSize: 11, fontWeight: 700, color: s.color }}>
                {s.val}
                {s.note && <span style={{ fontSize: 9, color: LOSS, marginLeft: 8 }}>{s.note}</span>}
              </span>
            </div>
            <div style={{ height: 5, background: '#252525', borderRadius: 3 }}>
              <div style={{ height: '100%', width: `${barW}%`, background: s.color, borderRadius: 3, opacity: 0.8 }} />
            </div>
          </div>
        );
      })}
      {v2Data?.timestamp && (
        <div style={{ fontSize: 9, color: '#333', marginTop: 8, textAlign: 'right' }}>
          Last scan: {fmtAge(v2Data.timestamp)}
        </div>
      )}
    </div>
  );
}

function WeightDriftJournal({ driftData }) {
  if (!driftData || !driftData.length) {
    return <EmptyState msg="Weight drift journal populates after nightly learning runs — first run tonight at 5:30 PM ET" />;
  }
  const entries = [...driftData].reverse().slice(0, 12);
  return (
    <div>
      {entries.map((e, i) => {
        const isSummary = e.signal === '_summary';
        const changePct = e.change_pct;
        const ts = e.ts ? new Date(e.ts).toLocaleDateString('en-US', { month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit' }) : '—';
        return (
          <div key={i} style={{
            padding: '8px 0', borderBottom: '1px solid #252525',
            opacity: isSummary ? 0.65 : 1,
          }}>
            <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'flex-start', marginBottom: 2 }}>
              <span style={{ fontSize: 11, fontWeight: 600, color: isSummary ? MUTED : '#e2e8f0' }}>
                {isSummary ? 'No adjustments' : e.signal?.replace(/_/g, ' ')}
              </span>
              {changePct != null && !isSummary && (
                <span style={{ fontSize: 12, fontWeight: 700, color: pnlColor(changePct) }}>
                  {changePct >= 0 ? '+' : ''}{changePct?.toFixed(1)}%
                </span>
              )}
            </div>
            {!isSummary && e.old_weight != null && (
              <div style={{ fontSize: 9, color: DIM, marginBottom: 2 }}>
                {e.old_weight?.toFixed(3)} → {e.new_weight?.toFixed(3)} · n={e.sample_size} · wr={((e.win_rate || 0) * 100).toFixed(0)}%
              </div>
            )}
            <div style={{ fontSize: 9, color: '#555', lineHeight: 1.4 }}>
              {isSummary ? (e.reasoning || '').substring(0, 80) : (e.reasoning || '').substring(0, 100)}
              {' · '}<span style={{ color: '#333' }}>{ts}</span>
            </div>
          </div>
        );
      })}
    </div>
  );
}

function MindTab({ v2Data, driftData, regime }) {
  return (
    <div style={{ padding: '12px 16px 8px' }}>
      {/* Header row: title + regime gauge */}
      <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'flex-start', marginBottom: 12 }}>
        <div>
          <div style={{ fontSize: 13, fontWeight: 700, color: '#e2e8f0' }}>Today's Cognition</div>
          <div style={{ fontSize: 10, color: DIM }}>decision funnel · weight drift · regime</div>
        </div>
        <RegimeGauge regime={regime} />
      </div>

      {/* Decision funnel */}
      <Card style={{ marginBottom: 12 }}>
        <Label>Decision Funnel</Label>
        <DecisionFunnel v2Data={v2Data} />
      </Card>

      {/* Weight drift journal */}
      <Card style={{ marginBottom: 12 }}>
        <Label>Weight Drift Journal</Label>
        <WeightDriftJournal driftData={driftData} />
      </Card>

      {/* Regime detail */}
      {regime && (
        <Card style={{ marginBottom: 12 }}>
          <Label>Market Regime Detail</Label>
          <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 10 }}>
            {[
              { label: 'IWM 20d Return', val: regime.iwm_return_20d != null ? fmtPct(regime.iwm_return_20d) : '—', color: regime.iwm_return_20d != null ? pnlColor(regime.iwm_return_20d) : DIM },
              { label: 'SPX Realized Vol', val: regime.spy_realized_vol_20d != null ? regime.spy_realized_vol_20d.toFixed(1) + '%' : '—', color: regime.spy_realized_vol_20d > 25 ? LOSS : regime.spy_realized_vol_20d < 15 ? GAIN : SQUEEZE },
              { label: 'Breadth Delta', val: regime.breadth_differential != null ? fmtPct(regime.breadth_differential) : '—', color: regime.breadth_differential != null ? pnlColor(regime.breadth_differential) : DIM },
              { label: 'Signal', val: regime.regime_label || '—', color: '#e2e8f0' },
            ].map(({ label, val, color }) => (
              <div key={label} style={{ background: '#252525', borderRadius: 8, padding: '10px 12px' }}>
                <div style={{ fontSize: 9, color: DIM, textTransform: 'uppercase', marginBottom: 4 }}>{label}</div>
                <div style={{ fontSize: 12, fontWeight: 700, color }}>{val}</div>
              </div>
            ))}
          </div>
          <div style={{ fontSize: 9, color: '#333', marginTop: 8, textAlign: 'right' }}>
            {regime.stub ? '⚠ stub values' : fmtAge(regime.ts)}
            {' · '}{regime.data_source}
          </div>
        </Card>
      )}
    </div>
  );
}

// ══════════════════════════════════════════════════════════════════
// HEADER + BOTTOM NAV
// ══════════════════════════════════════════════════════════════════
const TABS = [
  { id: 'month', label: 'Month',  icon: '◈' },
  { id: 'mind',  label: 'Mind',   icon: '◉' },
];

function BottomTabBar({ active, onChange }) {
  return (
    <div style={{
      position: 'fixed', bottom: 0, left: 0, right: 0,
      height: 56, background: '#181818', borderTop: '1px solid #2a2a2a',
      display: 'flex', zIndex: 200,
      paddingBottom: 'env(safe-area-inset-bottom, 0)',
    }}>
      {TABS.map(tab => {
        const on = active === tab.id;
        return (
          <button key={tab.id} onClick={() => onChange(tab.id)} style={{
            flex: 1, background: 'none', border: 'none', cursor: 'pointer',
            display: 'flex', flexDirection: 'column', alignItems: 'center',
            justifyContent: 'center', gap: 2, minHeight: 44,
            color: on ? GAIN : '#555',
            transition: 'color 0.15s',
            WebkitTapHighlightColor: 'transparent',
          }}>
            <span style={{ fontSize: 20, lineHeight: 1 }}>{tab.icon}</span>
            <span style={{ fontSize: 10, fontWeight: on ? 700 : 400, letterSpacing: 0.3 }}>{tab.label}</span>
          </button>
        );
      })}
    </div>
  );
}

// ══════════════════════════════════════════════════════════════════
// APP ROOT
// ══════════════════════════════════════════════════════════════════
function App() {
  const [tab, setTab] = useState('month');
  const [tick, setTick] = useState(0);

  useEffect(() => {
    const id = setInterval(() => setTick(t => t + 1), 60000);
    return () => clearInterval(id);
  }, []);

  const health       = usePoll('data/health.json',        HEALTH_POLL_MS);
  const v2Data       = usePoll('data/v2_dashboard.json',  V2_POLL_MS);
  const closedTrades = usePoll('data/closed_trades.json', CLOSED_POLL_MS);
  const equityHistory = useOnce('data/equity_history.json');
  const driftData    = useOnce('data/weight_drift.json');
  const regime       = useOnce('data/regime.json');

  const stats    = health?.stats || {};
  const equity   = stats.equity;
  const totalPnl = stats.total_pnl || 0;

  const now   = new Date();
  const wkday = now.getDay();
  const hour  = now.getHours();
  const inHrs = wkday >= 1 && wkday <= 5 && hour >= 4 && hour < 18;

  return (
    <div style={{ height: '100vh', display: 'flex', flexDirection: 'column', overflow: 'hidden' }}>
      {/* Header */}
      <div style={{
        background: '#181818', borderBottom: '1px solid #2a2a2a',
        padding: '10px 16px', display: 'flex', alignItems: 'center',
        justifyContent: 'space-between', flexShrink: 0,
      }}>
        <div style={{ display: 'flex', alignItems: 'center', gap: 8, flexWrap: 'wrap' }}>
          <span style={{ fontSize: 15, fontWeight: 800, color: GAIN, letterSpacing: -0.3 }}>
            SQUEEZE PROPHET
          </span>
          <span style={{
            fontSize: 9, fontWeight: 700, background: 'rgba(96,165,250,0.12)',
            color: '#60a5fa', border: '1px solid rgba(96,165,250,0.3)',
            borderRadius: 10, padding: '2px 7px',
          }}>PAPER</span>
          {inHrs && (
            <span style={{
              fontSize: 9, fontWeight: 700, background: 'rgba(16,185,129,0.12)',
              color: GAIN, border: `1px solid rgba(16,185,129,0.3)`,
              borderRadius: 10, padding: '2px 7px',
            }}>● LIVE</span>
          )}
        </div>
        <div style={{ textAlign: 'right' }}>
          {equity != null && (
            <div style={{ fontSize: 14, fontWeight: 700, color: pnlColor(totalPnl) }}>
              {fmt$k(equity)}
            </div>
          )}
          <div style={{ fontSize: 9, color: DIM }}>
            {now.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' })}
          </div>
        </div>
      </div>

      {/* Scrollable content */}
      <div style={{ flex: 1, overflowY: 'auto', overflowX: 'hidden', paddingBottom: 64 }}>
        {tab === 'month' && (
          <MonthTab
            health={health}
            equityHistory={equityHistory}
            closedTrades={Array.isArray(closedTrades) ? closedTrades : []}
          />
        )}
        {tab === 'mind' && (
          <MindTab
            v2Data={v2Data}
            driftData={driftData}
            regime={regime}
          />
        )}
      </div>

      <BottomTabBar active={tab} onChange={setTab} />
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
