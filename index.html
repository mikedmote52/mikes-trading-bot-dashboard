<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#121212">
  <title>Squeeze Prophet</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='75' font-size='75'>⚡</text></svg>">
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; height: 100%; overflow: hidden; }
    body {
      background: #121212;
      color: #e2e8f0;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
      -webkit-font-smoothing: antialiased;
    }
    #root { height: 100%; }
    ::-webkit-scrollbar { width: 3px; }
    ::-webkit-scrollbar-thumb { background: #333; border-radius: 2px; }
    button { font-family: inherit; }
  </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useId, useRef } = React;

// ── Constants ───────────────────────────────────────────────────────────
const STARTING_EQUITY = 100000;
const HEALTH_POLL_MS  = 30 * 1000;
const V2_POLL_MS      = 5  * 60 * 1000;
const CLOSED_POLL_MS  = 5  * 60 * 1000;

// Tiered stop/target levels from the 2026-04-17 strategy overhaul
const TIER_STOPS   = { S: 0.05, A: 0.07, B: 0.10, C: 0.12 };
const TIER_TARGETS = { S: 0.40, A: 0.35, B: 0.30, C: 0.20 };

const TIER_COLORS = {
  S: { bg: 'rgba(168,85,247,0.18)',  text: '#c084fc', border: 'rgba(168,85,247,0.5)' },
  A: { bg: 'rgba(16,185,129,0.18)',  text: '#10B981', border: 'rgba(16,185,129,0.5)' },
  B: { bg: 'rgba(245,158,11,0.18)',  text: '#F59E0B', border: 'rgba(245,158,11,0.5)' },
  C: { bg: 'rgba(148,163,184,0.10)', text: '#94a3b8', border: 'rgba(100,116,139,0.4)' },
};

const GAIN    = '#10B981';
const LOSS    = '#F87171';
const SQUEEZE = '#F59E0B';
const CARD_BG = '#1E1E1E';

// ── Utilities ───────────────────────────────────────────────────────────
const fmt$ = n => {
  const v = Math.abs(Number(n));
  return (Number(n) < 0 ? '-' : '') + '$' + v.toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
};
const fmt$k = n => {
  const v = Math.abs(Number(n));
  if (v >= 10000) return (Number(n) < 0 ? '-' : '') + '$' + (v / 1000).toFixed(1) + 'k';
  return fmt$(n);
};
const fmtPct = (n, dec = 1) => (Number(n) >= 0 ? '+' : '') + Number(n).toFixed(dec) + '%';
const fmtFloat = n => {
  const m = n / 1e6;
  return m < 1 ? (n / 1e3).toFixed(0) + 'K' : m < 10 ? m.toFixed(1) + 'M' : Math.round(m) + 'M';
};
const fmtAge = ms => {
  const m = Math.floor(ms / 60000);
  if (m < 60) return m + 'm';
  const h = Math.floor(m / 60);
  return h + 'h ' + (m % 60) + 'm';
};
const pnlColor = v => Number(v) >= 0 ? GAIN : LOSS;

function isTrifecta(pick) {
  const floatM  = (pick.float_shares || 0) / 1e6;
  const siPct   = (pick.short_pct || 0) * 100;
  const volAcc  = pick.volume_acceleration || 1;
  return floatM < 20 && siPct > 10 && volAcc > 2;
}

function scoreTier(score) {
  if (score >= 80) return 'S';
  if (score >= 60) return 'A';
  if (score >= 40) return 'B';
  return 'C';
}

function convTier(conv) {
  if (!conv) return 'C';
  const c = conv.toUpperCase();
  if (['S','A','B','C'].includes(c)) return c;
  if (c === 'HIGH')   return 'A';
  if (c === 'MEDIUM') return 'B';
  return 'C';
}

// ── Data fetching ───────────────────────────────────────────────────────
function usePoll(url, ms) {
  const [data, setData]   = useState(null);
  const [stamp, setStamp] = useState(null);
  useEffect(() => {
    let dead = false;
    const load = () =>
      fetch(url + '?t=' + Date.now(), { cache: 'no-store' })
        .then(r => r.ok ? r.json() : null)
        .then(d => { if (!dead && d) { setData(d); setStamp(Date.now()); } })
        .catch(() => {});
    load();
    const id = setInterval(load, ms);
    return () => { dead = true; clearInterval(id); };
  }, [url, ms]);
  return { data, stamp };
}

function useOnce(url) {
  const [data, setData] = useState(null);
  useEffect(() => {
    fetch(url + '?t=' + Date.now(), { cache: 'no-store' })
      .then(r => r.ok ? r.json() : null)
      .then(d => { if (d) setData(d); })
      .catch(() => {});
  }, [url]);
  return data;
}

// ── SVG Sparkline (equity curve) ────────────────────────────────────────
function Sparkline({ data, height = 80, color = GAIN, baseline = false }) {
  const uid = useId().replace(/[^a-z0-9]/gi, '');
  if (!data || data.length < 2) {
    return (
      <svg width="100%" height={height} style={{ display: 'block' }}>
        <text x="50%" y="50%" textAnchor="middle" fill="#444" fontSize="11">No data yet</text>
      </svg>
    );
  }
  const values = data.map(d => (typeof d === 'object' ? d.equity : d));
  const min = Math.min(...values);
  const max = Math.max(...values);
  const range = max - min || 1;
  const W = 300, H = height;
  const toX = i => (i / (values.length - 1)) * W;
  const toY = v => H - 4 - ((v - min) / range) * (H - 10);
  const linePts = values.map((v, i) => `${toX(i).toFixed(1)},${toY(v).toFixed(1)}`).join(' ');
  const areaPts = linePts + ` ${W},${H} 0,${H}`;
  let basePts = '';
  if (baseline) {
    basePts = values.map((_, i) => {
      const bv = STARTING_EQUITY * (1 + 0.638 * ((i + 1) / 34));
      const by = toY(Math.max(Math.min(bv, max * 1.2), min * 0.8));
      return `${toX(i).toFixed(1)},${by.toFixed(1)}`;
    }).join(' ');
  }
  return (
    <svg width="100%" height={height} viewBox={`0 0 ${W} ${H}`} preserveAspectRatio="none" style={{ display: 'block' }}>
      <defs>
        <linearGradient id={`g${uid}`} x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%"   stopColor={color} stopOpacity="0.3"/>
          <stop offset="100%" stopColor={color} stopOpacity="0.02"/>
        </linearGradient>
      </defs>
      <polygon points={areaPts} fill={`url(#g${uid})`} />
      {basePts && (
        <polyline points={basePts} fill="none" stroke={SQUEEZE}
          strokeWidth="1.5" strokeDasharray="5,4" opacity="0.55" />
      )}
      <polyline points={linePts} fill="none" stroke={color}
        strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" />
    </svg>
  );
}

// ── Tier Badge ──────────────────────────────────────────────────────────
function TierBadge({ tier, sm }) {
  const c = TIER_COLORS[tier] || TIER_COLORS.C;
  return (
    <span style={{
      background: c.bg, color: c.text, border: `1px solid ${c.border}`,
      borderRadius: 4, padding: sm ? '1px 5px' : '2px 7px',
      fontSize: sm ? 9 : 11, fontWeight: 700, letterSpacing: 0.5,
      display: 'inline-block', lineHeight: 1.4,
    }}>{tier}</span>
  );
}

// ── Card wrapper ────────────────────────────────────────────────────────
function Card({ children, style, leftBorder }) {
  return (
    <div style={{
      background: CARD_BG, borderRadius: 12, padding: 14,
      borderLeft: leftBorder ? `3px solid ${leftBorder}` : undefined,
      ...style,
    }}>
      {children}
    </div>
  );
}

// ── Section label ───────────────────────────────────────────────────────
function Label({ children, color }) {
  return (
    <div style={{
      fontSize: 10, color: color || '#94a3b8', textTransform: 'uppercase',
      letterSpacing: 1, fontWeight: 700, marginBottom: 10,
    }}>{children}</div>
  );
}

// ── Stat row ────────────────────────────────────────────────────────────
function StatRow({ label, value, color }) {
  return (
    <div style={{
      display: 'flex', justifyContent: 'space-between', alignItems: 'center',
      padding: '6px 0', borderBottom: '1px solid #252525',
    }}>
      <span style={{ fontSize: 12, color: '#94a3b8' }}>{label}</span>
      <span style={{ fontSize: 13, fontWeight: 700, color: color || '#e2e8f0' }}>{value}</span>
    </div>
  );
}

// ── Squeeze Trifecta Banner ─────────────────────────────────────────────
function SqueezeBanner({ picks }) {
  const hits = (picks || []).filter(isTrifecta);
  if (!hits.length) return null;
  return (
    <div style={{
      background: 'rgba(245,158,11,0.10)', border: `1px solid rgba(245,158,11,0.45)`,
      borderRadius: 10, padding: '12px 14px', marginBottom: 12,
    }}>
      <div style={{ display: 'flex', alignItems: 'center', gap: 8, marginBottom: 6 }}>
        <span style={{ fontSize: 16 }}>⚡</span>
        <span style={{ color: SQUEEZE, fontWeight: 800, fontSize: 13, textTransform: 'uppercase', letterSpacing: 1 }}>
          Squeeze Trifecta — {hits.length} Signal{hits.length > 1 ? 's' : ''}
        </span>
      </div>
      <p style={{ fontSize: 11, color: '#d4930a', margin: '0 0 8px', lineHeight: 1.5 }}>
        Low float · High short interest · Volume surge
      </p>
      <div style={{ display: 'flex', flexWrap: 'wrap', gap: 6 }}>
        {hits.map(p => (
          <span key={p.symbol} style={{
            background: 'rgba(245,158,11,0.12)', color: SQUEEZE,
            border: '1px solid rgba(245,158,11,0.35)',
            borderRadius: 6, padding: '4px 10px', fontWeight: 700, fontSize: 12,
          }}>
            {p.symbol}
            <span style={{ fontSize: 9, opacity: 0.75, marginLeft: 5 }}>
              {fmtFloat(p.float_shares || 0)} · {((p.short_pct || 0) * 100).toFixed(0)}% SI · {(p.volume_acceleration || 1).toFixed(1)}×
            </span>
          </span>
        ))}
      </div>
    </div>
  );
}

// ── Position Card ───────────────────────────────────────────────────────
function PositionCard({ pos, tier }) {
  const pnlPct   = parseFloat(pos.unrealized_plpc) * 100;
  const pnlDollar = parseFloat(pos.unrealized_pl);
  const entry    = parseFloat(pos.avg_entry_price);
  const current  = parseFloat(pos.current_price);
  const color    = pnlColor(pnlPct);

  const stopPct   = TIER_STOPS[tier]   || 0.10;
  const targetPct = TIER_TARGETS[tier] || 0.30;
  const stopPrice = (entry * (1 - stopPct)).toFixed(2);

  let exitLabel = 'HOLD', exitColor = '#64748b';
  if (pnlPct <= -(stopPct * 100))              { exitLabel = 'STOP';      exitColor = LOSS;    }
  else if (pnlPct <= -(stopPct * 100 * 0.65)) { exitLabel = 'NEAR STOP'; exitColor = SQUEEZE; }
  else if (pnlPct >= targetPct * 100)         { exitLabel = 'TARGET';    exitColor = GAIN;    }
  else if (pnlPct >= 20)                      { exitLabel = 'TRAILING';  exitColor = '#22d3ee'; }

  return (
    <Card style={{ marginBottom: 8 }}>
      {/* Header row */}
      <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'flex-start', marginBottom: 10 }}>
        <div style={{ display: 'flex', alignItems: 'center', gap: 8 }}>
          <span style={{ fontWeight: 800, fontSize: 17, color: '#fff' }}>{pos.symbol}</span>
          <TierBadge tier={tier} />
        </div>
        <div style={{ textAlign: 'right' }}>
          <div style={{ fontSize: 22, fontWeight: 800, color, lineHeight: 1 }}>{fmtPct(pnlPct)}</div>
          <div style={{ fontSize: 11, color, opacity: 0.85, marginTop: 2 }}>
            {pnlDollar >= 0 ? '+' : ''}{fmt$(pnlDollar)}
          </div>
        </div>
      </div>
      {/* Stats grid */}
      <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr 1fr 1fr', gap: 6 }}>
        {[
          { label: 'Entry',   value: fmt$(entry),    valueColor: '#94a3b8' },
          { label: 'Current', value: fmt$(current),  valueColor: '#fff'    },
          { label: 'Stop',    value: '$' + stopPrice, valueColor: LOSS     },
          { label: 'Status',  value: exitLabel,       valueColor: exitColor },
        ].map(({ label, value, valueColor }) => (
          <div key={label}>
            <div style={{ fontSize: 9, color: '#555', textTransform: 'uppercase', marginBottom: 2 }}>{label}</div>
            <div style={{ fontSize: 12, fontWeight: 700, color: valueColor }}>{value}</div>
          </div>
        ))}
      </div>
    </Card>
  );
}

// ── Anti-Chase Filter ───────────────────────────────────────────────────
function AntiChaseActivity({ positions, picks }) {
  if (!positions?.length) return null;
  const inRadar = new Set((picks || []).map(p => p.symbol));
  const aligned = positions.filter(p => inRadar.has(p.symbol));
  const other   = positions.filter(p => !inRadar.has(p.symbol));
  return (
    <Card style={{ marginBottom: 12 }}>
      <Label>Anti-Chase Filter</Label>
      <div style={{ display: 'flex', flexWrap: 'wrap', gap: 6, marginBottom: 8 }}>
        {aligned.map(p => (
          <span key={p.symbol} style={{
            background: 'rgba(16,185,129,0.10)', color: GAIN,
            border: '1px solid rgba(16,185,129,0.3)',
            borderRadius: 4, padding: '3px 9px', fontSize: 11, fontWeight: 600,
          }}>✓ {p.symbol}</span>
        ))}
        {other.map(p => (
          <span key={p.symbol} style={{
            background: 'rgba(100,116,139,0.10)', color: '#64748b',
            border: '1px solid rgba(100,116,139,0.25)',
            borderRadius: 4, padding: '3px 9px', fontSize: 11, fontWeight: 600,
          }}>~ {p.symbol}</span>
        ))}
      </div>
      <p style={{ fontSize: 10, color: '#475569', margin: 0 }}>
        ✓ matches today's radar picks  ·  ~ not in current scan
      </p>
    </Card>
  );
}

// ═══════════════════════════════════════════════════════════════════════
// HOME TAB
// ═══════════════════════════════════════════════════════════════════════
function HomeTab({ health, v2Data, closedTrades }) {
  const stats     = health?.stats || {};
  const positions = health?.positions || [];
  const picks     = v2Data?.top_picks || [];

  const equity     = stats.equity      || 0;
  const totalPnl   = stats.total_pnl   || 0;
  const totalPct   = stats.total_pnl_pct || 0;
  const dayPnl     = stats.day_pnl     || 0;
  const dayPct     = equity > 0 ? (dayPnl / (equity - dayPnl)) * 100 : 0;
  const cash       = stats.cash        || 0;

  const wins     = (closedTrades || []).filter(t => t.pnl_pct > 0).length;
  const total    = (closedTrades || []).length;
  const winRate  = total > 0 ? (wins / total * 100).toFixed(0) + '%' : '—';

  // symbol → tier map from v2 research
  const tierMap = {};
  [...(picks), ...(v2Data?.trade_candidates || [])].forEach(p => {
    if (!tierMap[p.symbol]) tierMap[p.symbol] = convTier(p.conviction) || scoreTier(p.score || 0);
  });

  return (
    <div style={{ padding: '12px 16px 8px' }}>
      <SqueezeBanner picks={picks} />

      {/* Hero P&L */}
      <Card style={{ marginBottom: 12 }}>
        <div style={{ fontSize: 10, color: '#64748b', textTransform: 'uppercase', letterSpacing: 1, marginBottom: 4 }}>
          Total P&L
        </div>
        <div style={{ fontSize: 36, fontWeight: 800, color: pnlColor(totalPnl), lineHeight: 1, letterSpacing: -1 }}>
          {totalPnl >= 0 ? '+' : ''}{fmt$(totalPnl)}
        </div>
        <div style={{ fontSize: 13, color: pnlColor(totalPct), fontWeight: 600, marginTop: 4, marginBottom: 16 }}>
          {fmtPct(totalPct)} from ${STARTING_EQUITY.toLocaleString()}
        </div>
        <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr 1fr 1fr', gap: 10, paddingTop: 12, borderTop: '1px solid #2a2a2a' }}>
          {[
            { label: 'Equity',   value: fmt$k(equity),   color: '#fff'             },
            { label: 'Day P&L',  value: (dayPnl >= 0 ? '+' : '') + fmt$(dayPnl), color: pnlColor(dayPnl) },
            { label: 'Cash',     value: fmt$k(cash),      color: '#cbd5e1'          },
            { label: 'Win Rate', value: winRate,           color: GAIN               },
          ].map(({ label, value, color }) => (
            <div key={label}>
              <div style={{ fontSize: 9, color: '#555', textTransform: 'uppercase', marginBottom: 2 }}>{label}</div>
              <div style={{ fontSize: 15, fontWeight: 700, color }}>{value}</div>
            </div>
          ))}
        </div>
      </Card>

      <AntiChaseActivity positions={positions} picks={picks} />

      <div style={{ fontSize: 10, color: '#94a3b8', textTransform: 'uppercase', letterSpacing: 1, fontWeight: 700, marginBottom: 8 }}>
        Open Positions ({positions.length})
      </div>

      {positions.length === 0 ? (
        <Card>
          <p style={{ textAlign: 'center', color: '#475569', fontSize: 13, margin: '8px 0' }}>No open positions</p>
        </Card>
      ) : (
        [...positions]
          .sort((a, b) => parseFloat(b.unrealized_plpc) - parseFloat(a.unrealized_plpc))
          .map(pos => (
            <PositionCard key={pos.symbol} pos={pos} tier={tierMap[pos.symbol] || 'C'} />
          ))
      )}
    </div>
  );
}

// ═══════════════════════════════════════════════════════════════════════
// RADAR TAB
// ═══════════════════════════════════════════════════════════════════════
function PickCard({ pick }) {
  const tier = convTier(pick.conviction) || scoreTier(pick.score || 0);
  const tc   = TIER_COLORS[tier] || TIER_COLORS.C;
  const hit  = isTrifecta(pick);
  const floatM = (pick.float_shares || 0) / 1e6;
  const siPct  = ((pick.short_pct || 0) * 100).toFixed(1);
  const vol    = (pick.volume_acceleration || 1).toFixed(1);

  return (
    <Card style={{ marginBottom: 8, borderLeft: `3px solid ${hit ? SQUEEZE : tc.border}` }}>
      <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'flex-start', marginBottom: 8 }}>
        <div style={{ display: 'flex', alignItems: 'center', gap: 8, flexWrap: 'wrap' }}>
          <span style={{ fontWeight: 800, fontSize: 16, color: '#fff' }}>{pick.symbol}</span>
          <TierBadge tier={tier} />
          {hit && (
            <span style={{
              fontSize: 9, fontWeight: 700, color: SQUEEZE,
              background: 'rgba(245,158,11,0.12)', border: `1px solid rgba(245,158,11,0.3)`,
              borderRadius: 3, padding: '2px 5px',
            }}>⚡ TRIFECTA</span>
          )}
          {pick.has_catalyst && (
            <span style={{
              fontSize: 9, fontWeight: 700, color: '#c084fc',
              background: 'rgba(168,85,247,0.12)', border: '1px solid rgba(168,85,247,0.3)',
              borderRadius: 3, padding: '2px 5px',
            }}>CATALYST</span>
          )}
        </div>
        <span style={{ fontSize: 20, fontWeight: 800, color: tc.text, flexShrink: 0 }}>
          {pick.score || pick.raw_score || '—'}
        </span>
      </div>
      <p style={{ fontSize: 10, color: '#94a3b8', margin: '0 0 8px', lineHeight: 1.5 }}>
        {(pick.thesis || '').substring(0, 130)}{(pick.thesis || '').length > 130 ? '…' : ''}
      </p>
      <div style={{ display: 'flex', gap: 10, flexWrap: 'wrap', fontSize: 10 }}>
        {floatM > 0 && (
          <span style={{ color: floatM < 10 ? GAIN : '#64748b' }}>
            Float: {fmtFloat(pick.float_shares || 0)}
          </span>
        )}
        {pick.short_pct > 0 && (
          <span style={{ color: parseFloat(siPct) > 15 ? SQUEEZE : '#64748b' }}>
            SI: {siPct}%
          </span>
        )}
        {pick.volume_acceleration > 1 && (
          <span style={{ color: pick.volume_acceleration > 3 ? GAIN : '#64748b' }}>
            Vol: {vol}×
          </span>
        )}
      </div>
    </Card>
  );
}

function RadarTab({ v2Data, premarket }) {
  const picks      = v2Data?.top_picks || [];
  const candidates = v2Data?.trade_candidates || [];
  const social     = v2Data?.social_trending || {};
  const trifectas  = picks.filter(isTrifecta);
  const socialList = Object.entries(social).sort((a, b) => b[1] - a[1]);

  const v2ts = v2Data?.timestamp ? new Date(v2Data.timestamp) : null;

  return (
    <div style={{ padding: '12px 16px 8px' }}>
      {/* Scan summary */}
      <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr 1fr', gap: 8, marginBottom: 14 }}>
        {[
          { label: 'Discovered', val: v2Data?.candidates_discovered, color: '#60a5fa' },
          { label: 'Evaluated',  val: v2Data?.candidates_evaluated,  color: SQUEEZE   },
          { label: 'Trade Ready',val: v2Data?.ready_to_trade,         color: GAIN      },
        ].map(s => (
          <Card key={s.label} style={{ textAlign: 'center', padding: '10px 8px' }}>
            <div style={{ fontSize: 9, color: '#555', textTransform: 'uppercase', marginBottom: 4 }}>{s.label}</div>
            <div style={{ fontSize: 24, fontWeight: 800, color: s.color }}>{s.val ?? '—'}</div>
          </Card>
        ))}
      </div>

      {v2ts && (
        <p style={{ fontSize: 10, color: '#475569', margin: '-6px 0 12px', textAlign: 'right' }}>
          Last scan: {v2ts.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' })}
        </p>
      )}

      {/* Trifecta alerts */}
      {trifectas.length > 0 && (
        <>
          <div style={{ fontSize: 10, color: SQUEEZE, textTransform: 'uppercase', letterSpacing: 1, fontWeight: 700, marginBottom: 8 }}>
            ⚡ Trifecta ({trifectas.length})
          </div>
          {trifectas.map(p => <PickCard key={p.symbol} pick={p} />)}
        </>
      )}

      {/* Top picks */}
      <div style={{ fontSize: 10, color: '#94a3b8', textTransform: 'uppercase', letterSpacing: 1, fontWeight: 700, marginBottom: 8, marginTop: trifectas.length ? 6 : 0 }}>
        Top Picks ({picks.length})
      </div>
      {picks.length === 0 ? (
        <Card>
          <p style={{ textAlign: 'center', color: '#475569', fontSize: 12, margin: '12px 0' }}>
            Waiting for next research scan…
          </p>
        </Card>
      ) : (
        picks.map(p => <PickCard key={p.symbol} pick={p} />)
      )}

      {/* Watchlist / candidates */}
      {candidates.length > 0 && (
        <>
          <div style={{ fontSize: 10, color: '#94a3b8', textTransform: 'uppercase', letterSpacing: 1, fontWeight: 700, margin: '14px 0 8px' }}>
            Watchlist ({candidates.length})
          </div>
          {candidates.map(c => (
            <Card key={c.symbol} style={{ marginBottom: 6, display: 'flex', alignItems: 'center', justifyContent: 'space-between', padding: '10px 14px' }}>
              <div>
                <span style={{ fontWeight: 700, fontSize: 14, color: '#fff' }}>{c.symbol}</span>
                <span style={{ fontSize: 10, color: '#475569', marginLeft: 8 }}>seen {c.times_seen}×</span>
              </div>
              <TierBadge tier={scoreTier(c.score || 0)} sm />
            </Card>
          ))}
        </>
      )}

      {/* Premarket targets */}
      {premarket?.targets?.length > 0 && (
        <>
          <div style={{ fontSize: 10, color: '#94a3b8', textTransform: 'uppercase', letterSpacing: 1, fontWeight: 700, margin: '14px 0 8px' }}>
            Pre-Market Targets ({premarket.targets.length})
          </div>
          <Card style={{ padding: 12 }}>
            <div style={{ display: 'flex', flexWrap: 'wrap', gap: 6 }}>
              {premarket.targets.map(t => {
                const prioColor = t.priority === 'HIGH' ? GAIN : t.priority === 'MEDIUM' ? SQUEEZE : '#64748b';
                return (
                  <span key={t.symbol} style={{
                    background: `${prioColor}18`, color: prioColor,
                    border: `1px solid ${prioColor}40`,
                    borderRadius: 5, padding: '4px 10px', fontSize: 11, fontWeight: 600,
                  }}>
                    {t.symbol}
                    {t.premarket_mover && <span style={{ fontSize: 9, marginLeft: 4, opacity: 0.7 }}>↑PM</span>}
                  </span>
                );
              })}
            </div>
          </Card>
        </>
      )}

      {/* Social */}
      {socialList.length > 0 && (
        <>
          <div style={{ fontSize: 10, color: '#94a3b8', textTransform: 'uppercase', letterSpacing: 1, fontWeight: 700, margin: '14px 0 8px' }}>
            Reddit Trending
          </div>
          <Card style={{ padding: 12 }}>
            <div style={{ display: 'flex', flexWrap: 'wrap', gap: 6 }}>
              {socialList.slice(0, 20).map(([sym, cnt]) => {
                const heat = cnt >= 10 ? '#ef4444' : cnt >= 5 ? SQUEEZE : '#60a5fa';
                const bg   = cnt >= 10 ? 'rgba(239,68,68,0.10)' : cnt >= 5 ? 'rgba(245,158,11,0.10)' : 'rgba(96,165,250,0.10)';
                return (
                  <span key={sym} style={{ padding: '3px 9px', borderRadius: 4, background: bg, color: heat, fontWeight: 600, fontSize: 11 }}>
                    ${sym} <span style={{ fontSize: 9, opacity: 0.65 }}>×{cnt}</span>
                  </span>
                );
              })}
            </div>
          </Card>
        </>
      )}
    </div>
  );
}

// ═══════════════════════════════════════════════════════════════════════
// PERFORMANCE TAB
// ═══════════════════════════════════════════════════════════════════════
const SIGNAL_LABELS = {
  has_float_squeeze: 'Float Squeeze',
  has_short_squeeze: 'Short Squeeze',
  has_volume_spike:  'Volume Spike',
  has_catalyst:      'Catalyst',
  has_social_buzz:   'Social Buzz',
  has_biotech:       'Biotech Sector',
};

function SignalRow({ label, fired }) {
  if (!fired || !fired.n) {
    return (
      <div style={{ display: 'flex', justifyContent: 'space-between', padding: '6px 0', borderBottom: '1px solid #252525' }}>
        <span style={{ fontSize: 12, color: '#475569' }}>{label}</span>
        <span style={{ fontSize: 10, color: '#333' }}>no data (n=0)</span>
      </div>
    );
  }
  const wr  = (fired.win_rate * 100).toFixed(0);
  const edge = fired.edge != null ? (fired.edge * 100).toFixed(1) : null;
  return (
    <div style={{ padding: '8px 0', borderBottom: '1px solid #252525' }}>
      <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center' }}>
        <span style={{ fontSize: 12, color: '#e2e8f0' }}>{label}</span>
        <div>
          <span style={{ fontSize: 14, fontWeight: 700, color: fired.win_rate >= 0.5 ? GAIN : LOSS }}>
            {wr}%
          </span>
          {edge != null && (
            <span style={{ fontSize: 10, marginLeft: 8, color: parseFloat(edge) > 0 ? GAIN : LOSS }}>
              {parseFloat(edge) > 0 ? '+' : ''}{edge}% edge
            </span>
          )}
        </div>
      </div>
      <div style={{ display: 'flex', gap: 10, marginTop: 2, fontSize: 10, color: '#555' }}>
        <span>n={fired.n}</span>
        <span style={{ color: GAIN }}>+{(fired.avg_win || 0).toFixed(1)}% avg win</span>
        <span style={{ color: LOSS }}>{(fired.avg_loss || 0).toFixed(1)}% avg loss</span>
      </div>
    </div>
  );
}

function PerformanceTab({ evalReport, equityHistory, closedTrades }) {
  const overall   = evalReport?.overall || {};
  const bySignal  = evalReport?.by_signal || {};

  const n       = overall.n || 0;
  const wins    = n ? Math.round(n * (overall.win_rate || 0)) : 0;
  const losses  = n - wins;
  const wr      = overall.win_rate != null ? (overall.win_rate * 100).toFixed(1) + '%' : '—';
  const avgRet  = overall.avg_return != null ? overall.avg_return : null;

  const eqColor = (() => {
    if (!equityHistory || !equityHistory.length) return GAIN;
    const last = equityHistory[equityHistory.length - 1];
    const v = typeof last === 'object' ? last.equity : last;
    return v >= STARTING_EQUITY ? GAIN : LOSS;
  })();

  const sorted  = [...(closedTrades || [])].sort((a, b) => b.pnl_pct - a.pnl_pct);
  const best    = sorted[0];
  const worst   = sorted[sorted.length - 1];

  const hasAnySignalData = Object.values(bySignal).some(v => v?.fired?.n > 0);

  return (
    <div style={{ padding: '12px 16px 8px' }}>
      {/* Key stats */}
      <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 8, marginBottom: 12 }}>
        <Card>
          <div style={{ fontSize: 9, color: '#555', textTransform: 'uppercase', marginBottom: 4 }}>Win Rate</div>
          <div style={{ fontSize: 34, fontWeight: 800, color: wins >= losses ? GAIN : LOSS, lineHeight: 1 }}>{wr}</div>
          <div style={{ fontSize: 10, color: '#555', marginTop: 4 }}>{wins}W / {losses}L · {n} trades</div>
        </Card>
        <Card>
          <div style={{ fontSize: 9, color: '#555', textTransform: 'uppercase', marginBottom: 4 }}>Avg Return</div>
          <div style={{ fontSize: 34, fontWeight: 800, color: avgRet != null ? pnlColor(avgRet) : '#64748b', lineHeight: 1 }}>
            {avgRet != null ? fmtPct(avgRet, 2) : '—'}
          </div>
          <div style={{ fontSize: 10, color: '#555', marginTop: 4 }}>
            <span style={{ color: GAIN }}>+{(overall.avg_win || 0).toFixed(1)}%</span>
            {' / '}
            <span style={{ color: LOSS }}>{(overall.avg_loss || 0).toFixed(1)}%</span>
          </div>
        </Card>
      </div>

      {/* Equity curve */}
      <Card style={{ marginBottom: 12 }}>
        <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: 8 }}>
          <Label style={{ margin: 0 }}>Equity Curve</Label>
          <div style={{ display: 'flex', gap: 12, fontSize: 10 }}>
            <span style={{ color: eqColor }}>● Bot</span>
            <span style={{ color: SQUEEZE, opacity: 0.7 }}>- - 63.8% target</span>
          </div>
        </div>
        <Sparkline data={equityHistory} height={80} color={eqColor} baseline />
      </Card>

      {/* Best / Worst */}
      {(best || worst) && (
        <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 8, marginBottom: 12 }}>
          {best && (
            <Card leftBorder={GAIN}>
              <div style={{ fontSize: 9, color: '#555', textTransform: 'uppercase', marginBottom: 4 }}>Best Trade</div>
              <div style={{ fontSize: 16, fontWeight: 700, color: '#fff' }}>{best.symbol}</div>
              <div style={{ fontSize: 18, fontWeight: 800, color: GAIN }}>+{best.pnl_pct?.toFixed(1)}%</div>
              {best.reason && <div style={{ fontSize: 9, color: '#475569', marginTop: 3, lineHeight: 1.3 }}>{best.reason}</div>}
            </Card>
          )}
          {worst && (
            <Card leftBorder={LOSS}>
              <div style={{ fontSize: 9, color: '#555', textTransform: 'uppercase', marginBottom: 4 }}>Worst Trade</div>
              <div style={{ fontSize: 16, fontWeight: 700, color: '#fff' }}>{worst.symbol}</div>
              <div style={{ fontSize: 18, fontWeight: 800, color: LOSS }}>{worst.pnl_pct?.toFixed(1)}%</div>
              {worst.reason && <div style={{ fontSize: 9, color: '#475569', marginTop: 3, lineHeight: 1.3 }}>{worst.reason}</div>}
            </Card>
          )}
        </div>
      )}

      {/* Signal quality */}
      <Card style={{ marginBottom: 12 }}>
        <Label>Signal Quality</Label>
        {hasAnySignalData ? (
          Object.entries(bySignal).map(([key, val]) => (
            <SignalRow
              key={key}
              label={SIGNAL_LABELS[key] || key.replace(/_/g, ' ')}
              fired={val?.fired}
            />
          ))
        ) : (
          <p style={{ textAlign: 'center', color: '#475569', fontSize: 12, margin: '12px 0' }}>
            Insufficient signal data — signals fire on closed trades
          </p>
        )}
      </Card>

      {/* Recent closed trades */}
      {closedTrades?.length > 0 && (
        <Card style={{ marginBottom: 12 }}>
          <Label>Recent Closed Trades</Label>
          {[...closedTrades].reverse().slice(0, 10).map((t, i) => (
            <div key={i} style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', padding: '6px 0', borderBottom: '1px solid #252525' }}>
              <div>
                <span style={{ fontWeight: 700, fontSize: 13, color: '#fff' }}>{t.symbol}</span>
                <span style={{ fontSize: 10, color: '#475569', marginLeft: 8 }}>{t.date || ''}</span>
              </div>
              <div style={{ textAlign: 'right' }}>
                <div style={{ fontSize: 14, fontWeight: 700, color: pnlColor(t.pnl_pct) }}>
                  {t.pnl_pct >= 0 ? '+' : ''}{t.pnl_pct?.toFixed(1)}%
                </div>
                <div style={{ fontSize: 9, color: '#475569' }}>{fmt$(t.pnl_dollar || 0)}</div>
              </div>
            </div>
          ))}
        </Card>
      )}
    </div>
  );
}

const SCHEDULE = [
  { time: '4:30 AM',  label: 'Daemon starts',       icon: '🤖' },
  { time: '5:00 AM',  label: 'Pre-market prep',      icon: '🌅' },
  { time: '6:30 AM',  label: 'Research + execute',   icon: '🧪' },
  { time: '9:00 AM',  label: 'Research + execute',   icon: '🧪' },
  { time: '12:00 PM', label: 'Research + execute',   icon: '🧪' },
  { time: '1:00 PM',  label: 'EOD summary',          icon: '📋' },
  { time: '1:35 PM',  label: 'Learning loop',        icon: '🧠' },
  { time: '2:00 PM',  label: 'After-hours research', icon: '🌙' },
  { time: '5:00 PM',  label: 'After-hours research', icon: '🔬' },
  { time: '6:00 PM',  label: 'Daemon shutdown',      icon: '🛑' },
  { time: 'Always',   label: 'Position monitor 60s', icon: '👁' },
];

function parseMins(t) {
  if (t === 'Always') return null;
  const m = t.match(/(\d+):(\d+)\s*(AM|PM)/);
  if (!m) return null;
  let h = parseInt(m[1]);
  const min = parseInt(m[2]);
  if (m[3] === 'PM' && h !== 12) h += 12;
  if (m[3] === 'AM' && h === 12) h = 0;
  return h * 60 + min;
}

function SystemTab({ health, v2Data }) {
  const stats = health?.stats || {};
  const now   = new Date();
  const nm    = now.getHours() * 60 + now.getMinutes();
  const wkday = now.getDay() >= 1 && now.getDay() <= 5;
  const inHrs = wkday && now.getHours() >= 4 && now.getHours() < 18;

  const hAge = health?.timestamp  ? Math.round((Date.now() - new Date(health.timestamp).getTime())  / 60000) : null;
  const vAge = v2Data?.timestamp  ? Math.round((Date.now() - new Date(v2Data.timestamp).getTime())  / 60000) : null;

  return (
    <div style={{ padding: '12px 16px 8px' }}>
      {/* Bot Status */}
      <Card style={{ marginBottom: 12 }}>
        <Label>Bot Status</Label>
        <StatRow label="System"       value={health?.status || '—'}      color={health?.status === 'OK' ? GAIN : LOSS} />
        <StatRow label="Daemon"       value={inHrs ? 'RUNNING' : 'SLEEPING'} color={inHrs ? GAIN : '#64748b'} />
        <StatRow label="Health data"  value={hAge != null ? (hAge < 5 ? 'Live' : hAge + 'm ago') : '—'} color={hAge != null && hAge < 30 ? GAIN : SQUEEZE} />
        <StatRow label="Research data" value={vAge != null ? (vAge < 60 ? 'Fresh' : vAge + 'm ago') : '—'} color={vAge != null && vAge < 300 ? GAIN : SQUEEZE} />
        <StatRow label="Open positions" value={stats.num_positions ?? '—'} />
        <StatRow label="Total P&L"   value={stats.total_pnl != null ? fmt$(stats.total_pnl) : '—'} color={pnlColor(stats.total_pnl || 0)} />
      </Card>

      {/* Tiered exit rules */}
      <Card style={{ marginBottom: 12 }}>
        <Label>Tiered Exit Rules</Label>
        <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 8 }}>
          {Object.entries(TIER_STOPS).map(([tier, stop]) => {
            const tc = TIER_COLORS[tier];
            return (
              <div key={tier} style={{
                background: '#252525', borderRadius: 8, padding: '10px 12px',
                borderLeft: `3px solid ${tc.border}`,
              }}>
                <div style={{ marginBottom: 6 }}><TierBadge tier={tier} sm /></div>
                <div style={{ fontSize: 11, color: LOSS }}>Stop: −{(stop * 100).toFixed(0)}%</div>
                <div style={{ fontSize: 11, color: GAIN }}>Target: +{(TIER_TARGETS[tier] * 100).toFixed(0)}%</div>
              </div>
            );
          })}
        </div>
        <p style={{ fontSize: 10, color: '#475569', margin: '10px 0 0' }}>
          HWM trailing stop −10% after +20% · Time exit: 30 days
        </p>
      </Card>

      {/* Config */}
      <Card style={{ marginBottom: 12 }}>
        <Label>Configuration</Label>
        <StatRow label="Starting equity" value="$100,000" />
        <StatRow label="Daily budget"    value="$300" />
        <StatRow label="Per ticker"      value="$100" />
        <StatRow label="Max positions"   value="20" />
        <StatRow label="Mode"            value="Paper Trading" color="#60a5fa" />
        <StatRow label="Exchange"        value="Alpaca" />
      </Card>

      {/* Schedule */}
      <Card style={{ marginBottom: 12 }}>
        <Label>Daily Schedule (PT)</Label>
        {SCHEDULE.map((s, i) => {
          const sm = parseMins(s.time);
          const active = s.time === 'Always'
            ? (nm >= 270 && nm <= 795)
            : (sm != null && Math.abs(nm - sm) < 20);
          return (
            <div key={i} style={{
              display: 'flex', alignItems: 'center', gap: 10,
              padding: '7px 10px', borderRadius: 6, marginBottom: 2,
              background: active ? 'rgba(16,185,129,0.07)' : 'transparent',
              borderLeft: active ? `2px solid ${GAIN}` : '2px solid #252525',
            }}>
              <span style={{ fontSize: 13 }}>{s.icon}</span>
              <span style={{ fontSize: 10, color: '#60a5fa', fontWeight: 600, minWidth: 65 }}>{s.time}</span>
              <span style={{ fontSize: 10, color: active ? GAIN : '#94a3b8', flex: 1 }}>{s.label}</span>
              {active && <span style={{ fontSize: 9, color: GAIN, fontWeight: 700 }}>NOW</span>}
            </div>
          );
        })}
      </Card>
    </div>
  );
}

// ═══════════════════════════════════════════════════════════════════════
// STALE BANNER
// ═══════════════════════════════════════════════════════════════════════
function StaleBanner({ v2Data }) {
  if (!v2Data?.timestamp) return null;
  const ageMs = Date.now() - new Date(v2Data.timestamp).getTime();
  const hour  = new Date().getHours();
  const isWknd = [0, 6].includes(new Date().getDay());
  const warnMs = isWknd ? 3 * 24 * 3600000 : (hour >= 6 && hour <= 14 ? 4 * 3600000 : 18 * 3600000);
  if (ageMs < warnMs) return null;
  const isDead  = ageMs > warnMs * 4;
  const isStale = ageMs > warnMs * 2;
  const bg = isDead ? '#7f1d1d' : isStale ? '#92400e' : '#78350f';
  return (
    <div style={{
      position: 'fixed', top: 0, left: 0, right: 0, zIndex: 300,
      background: bg, color: '#fef3c7',
      padding: '7px 16px', fontSize: 12, fontWeight: 600, textAlign: 'center',
    }}>
      Research scan {fmtAge(ageMs)} old{isDead ? ' — pipeline may need attention' : ''}
    </div>
  );
}

// ═══════════════════════════════════════════════════════════════════════
// BOTTOM TAB BAR
// ═══════════════════════════════════════════════════════════════════════
const TABS = [
  { id: 'home',   label: 'Home',   icon: '◉' },
  { id: 'radar',  label: 'Radar',  icon: '◎' },
  { id: 'perf',   label: 'Perf',   icon: '↗' },
  { id: 'system', label: 'System', icon: '⚙' },
];

function BottomTabBar({ active, onChange }) {
  return (
    <div style={{
      position: 'fixed', bottom: 0, left: 0, right: 0,
      height: 56, background: '#181818', borderTop: '1px solid #2a2a2a',
      display: 'flex', zIndex: 200,
      paddingBottom: 'env(safe-area-inset-bottom, 0)',
    }}>
      {TABS.map(tab => {
        const on = active === tab.id;
        return (
          <button key={tab.id} onClick={() => onChange(tab.id)} style={{
            flex: 1, background: 'none', border: 'none', cursor: 'pointer',
            display: 'flex', flexDirection: 'column', alignItems: 'center',
            justifyContent: 'center', gap: 2, minHeight: 44,
            color: on ? GAIN : '#555',
            transition: 'color 0.15s',
            WebkitTapHighlightColor: 'transparent',
          }}>
            <span style={{ fontSize: 18, lineHeight: 1 }}>{tab.icon}</span>
            <span style={{ fontSize: 10, fontWeight: on ? 700 : 400, letterSpacing: 0.3 }}>{tab.label}</span>
          </button>
        );
      })}
    </div>
  );
}

// ═══════════════════════════════════════════════════════════════════════
// APP ROOT
// ═══════════════════════════════════════════════════════════════════════
function App() {
  const [tab, setTab] = useState('home');

  const { data: health }      = usePoll('data/health.json',       HEALTH_POLL_MS);
  const { data: v2Data }      = usePoll('data/v2_dashboard.json', V2_POLL_MS);
  const { data: closedTrades }= usePoll('data/closed_trades.json',CLOSED_POLL_MS);
  const equityHistory          = useOnce('data/equity_history.json');
  const evalReport             = useOnce('data/learning_eval_report.json');
  const premarket              = useOnce('data/premarket_targets.json');

  const [tick, setTick] = useState(0);
  useEffect(() => {
    const id = setInterval(() => setTick(t => t + 1), 60000);
    return () => clearInterval(id);
  }, []);

  const picks       = v2Data?.top_picks || [];
  const trifectas   = picks.filter(isTrifecta).length;
  const stats       = health?.stats || {};
  const equity      = stats.equity;
  const totalPnl    = stats.total_pnl || 0;
  const wkday       = new Date().getDay();
  const hour        = new Date().getHours();
  const inHrs       = wkday >= 1 && wkday <= 5 && hour >= 4 && hour < 18;

  const staleBannerH = (() => {
    if (!v2Data?.timestamp) return 0;
    const ageMs  = Date.now() - new Date(v2Data.timestamp).getTime();
    const isWknd = [0, 6].includes(new Date().getDay());
    const warnMs = isWknd ? 3*24*3600000 : (hour >= 6 && hour <= 14 ? 4*3600000 : 18*3600000);
    return ageMs >= warnMs ? 34 : 0;
  })();

  return (
    <div style={{ height: '100vh', display: 'flex', flexDirection: 'column', overflow: 'hidden' }}>
      <StaleBanner v2Data={v2Data} />

      {/* Header */}
      <div style={{
        background: '#181818', borderBottom: '1px solid #2a2a2a',
        padding: '10px 16px', display: 'flex', alignItems: 'center',
        justifyContent: 'space-between', flexShrink: 0,
        marginTop: staleBannerH,
      }}>
        <div style={{ display: 'flex', alignItems: 'center', gap: 8, flexWrap: 'wrap' }}>
          <span style={{ fontSize: 15, fontWeight: 800, color: GAIN, letterSpacing: -0.3 }}>
            SQUEEZE PROPHET
          </span>
          <span style={{
            fontSize: 9, fontWeight: 700, background: 'rgba(96,165,250,0.12)',
            color: '#60a5fa', border: '1px solid rgba(96,165,250,0.3)',
            borderRadius: 10, padding: '2px 7px',
          }}>PAPER</span>
          {inHrs && (
            <span style={{
              fontSize: 9, fontWeight: 700, background: 'rgba(16,185,129,0.12)',
              color: GAIN, border: `1px solid rgba(16,185,129,0.3)`,
              borderRadius: 10, padding: '2px 7px',
            }}>● LIVE</span>
          )}
          {trifectas > 0 && (
            <span style={{
              fontSize: 9, fontWeight: 700, color: SQUEEZE,
              background: 'rgba(245,158,11,0.12)', border: `1px solid rgba(245,158,11,0.3)`,
              borderRadius: 10, padding: '2px 7px',
            }}>⚡ {trifectas}</span>
          )}
        </div>
        <div style={{ textAlign: 'right' }}>
          {equity != null && (
            <div style={{ fontSize: 14, fontWeight: 700, color: pnlColor(totalPnl) }}>
              {fmt$k(equity)}
            </div>
          )}
          <div style={{ fontSize: 9, color: '#475569' }}>
            {new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' })}
          </div>
        </div>
      </div>

      {/* Scrollable content */}
      <div style={{ flex: 1, overflowY: 'auto', overflowX: 'hidden', paddingBottom: 64 }}>
        {tab === 'home'   && <HomeTab        health={health} v2Data={v2Data} closedTrades={closedTrades} />}
        {tab === 'radar'  && <RadarTab       v2Data={v2Data} premarket={premarket} />}
        {tab === 'perf'   && <PerformanceTab evalReport={evalReport} equityHistory={equityHistory} closedTrades={closedTrades} />}
        {tab === 'system' && <SystemTab      health={health} v2Data={v2Data} />}
      </div>

      <BottomTabBar active={tab} onChange={setTab} />
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
